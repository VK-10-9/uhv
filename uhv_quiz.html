<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHV Exam Companion — Premium Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdfcfb;
    --card-bg: #ffffff;
    --text-main: #2d2a25;
    --text-muted: #726d64;
    --border: #e6e2da;
    --accent: #8c603f;
    --accent-hover: #754f32;
    --accent-light: #f7f3ed;
    --correct: #387b50;
    --correct-bg: #eaf6ee;
    --correct-border: #bcdfc6;
    --wrong: #c44737;
    --wrong-bg: #fdf1f0;
    --wrong-border: #f5cfca;
    --high-priority: #d97706;
    --shadow: 0 4px 20px rgba(140, 96, 63, 0.04);
    --shadow-hover: 0 10px 30px rgba(140, 96, 63, 0.08);
  }
  
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  body {
    background-color: var(--bg);
    color: var(--text-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    line-height: 1.6;
    padding: 40px 20px 100px;
    background-image: radial-gradient(var(--border) 0.5px, transparent 0.5px), radial-gradient(var(--border) 0.5px, var(--bg) 0.5px);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
  }
  
  .wrap {
    max-width: 800px;
    margin: 0 auto;
  }
  
  header {
    margin-bottom: 32px;
    text-align: center;
  }
  
  h1 {
    font-family: 'Lora', serif;
    font-size: 2.25rem;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  
  .sub {
    font-size: 0.95rem;
    color: var(--text-muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  
  /* Progress Bar Container */
  .progress-container {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  
  .progress-bar-bg {
    background: var(--accent-light);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }
  
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 0.9rem;
    position: sticky;
    top: 16px;
    z-index: 10;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.9);
  }
  
  .score-label {
    font-weight: 600;
    color: var(--text-main);
  }
  
  .score {
    font-weight: 800;
    color: var(--accent);
    font-size: 1.1rem;
  }
  
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  
  select, button {
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text-main);
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
  }
  
  select:hover, select:focus {
    border-color: var(--accent);
  }
  
  button.reset {
    background: var(--accent);
    color: #fff;
    border: none;
  }
  
  button.reset:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }
  
  button.reset:active {
    transform: translateY(0);
  }
  
  .q {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    transition: all 0.3s ease;
    box-shadow: var(--shadow);
  }
  
  .q:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--border);
  }
  
  .q.high {
    border-left: 4px solid var(--high-priority);
  }
  
  .qhead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  
  .qnum {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .freq {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-light);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  
  .freq.hi {
    background: #fef3c7;
    color: #b45309;
  }
  
  .qtext {
    font-family: 'Lora', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  
  .opts {
    display: grid;
    gap: 10px;
  }
  
  .opt {
    text-align: left;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-main);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    line-height: 1.4;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  
  .opt:hover:not([disabled]) {
    background: var(--accent-light);
    border-color: var(--accent);
    padding-left: 20px;
  }
  
  .opt.correct {
    background: var(--correct-bg) !important;
    border-color: var(--correct-border) !important;
    color: var(--correct) !important;
    font-weight: 700;
  }
  
  .opt.wrong {
    background: var(--wrong-bg) !important;
    border-color: var(--wrong-border) !important;
    color: var(--wrong) !important;
  }
  
  .opt[disabled] {
    cursor: default;
  }
  
  /* Explanation Card styling */
  .explanation-card {
    margin-top: 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  
  .explanation-header {
    padding: 10px 16px;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .explanation-header.correct {
    background: var(--correct-bg);
    color: var(--correct);
    border-bottom: 1px solid var(--correct-border);
  }
  
  .explanation-header.wrong {
    background: var(--wrong-bg);
    color: var(--wrong);
    border-bottom: 1px solid var(--wrong-border);
  }
  
  .explanation-body {
    padding: 16px;
    background: #ffffff;
    font-size: 0.92rem;
    color: var(--text-main);
  }
  
  .explanation-section {
    margin-bottom: 12px;
  }
  
  .explanation-section:last-child {
    margin-bottom: 0;
  }
  
  .explanation-title {
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 4px;
    color: var(--text-main);
  }
  
  .explanation-title.good {
    color: var(--correct);
  }
  
  .explanation-title.bad {
    color: var(--wrong);
  }
  
  .explanation-text {
    line-height: 1.5;
    color: #4a4740;
  }
  
  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .hidden {
    display: none !important;
  }
  
  @media (max-width: 600px) {
    body {
      padding: 20px 12px 60px;
    }
    h1 {
      font-size: 1.75rem;
    }
    .bar {
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
      position: static;
    }
    .controls {
      flex-direction: column;
      align-items: stretch;
    }
    select, button {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>UHV Study Companion</h1>
    <div class="sub">BUHK408 — Universal Human Values Exam Prep</div>
  </header>

  <!-- Progress Bar Component -->
  <div class="progress-container">
    <div class="progress-info">
      <span class="score-label">Exam Readiness Progress</span>
      <span id="progressText">0% Completed (0/0)</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
  </div>

  <div class="bar">
    <div>
      <span class="score-label">Score:</span> 
      <span class="score" id="score">0</span> / <span id="answered">0</span> answered
    </div>
    <div class="controls">
      <select id="filter">
        <option value="all">All questions</option>
        <option value="hi">High-priority (3+ papers)</option>
        <option value="wrong">Mistakes Only</option>
      </select>
      <button class="reset" id="resetBtn">Reset Quiz</button>
    </div>
  </div>

  <div id="quiz"></div>
</div>

<script>
// freq = number of the 6 papers this question (or its near-identical twin) appeared in
const QUESTIONS = [
  {freq:6, q:"Self-exploration uses two mechanisms:", opts:["Natural acceptance & experiential validation", "Right understanding and self-exploration", "Self-investigation and self-exploration", "Natural and verifiable"], a:0, explanations:["This is the correct option. The notes clearly state that self-exploration, the process for value education, is a two-part process involving 'Natural Acceptance' for verifying proposals and 'Experiential Validation' in living to check for mutual happiness and prosperity.", "Right understanding is the *outcome* or goal of self-exploration, not one of the mechanisms it uses. Self-exploration is the method employed to achieve right understanding.", "Self-investigation is largely synonymous with self-exploration itself, describing the internal process of inquiry. It is not a distinct second mechanism alongside self-exploration but rather part of its definition.", "Natural and verifiable are *guidelines* for the *content* of value education, ensuring it appeals to reason and can be experienced. They are not mechanisms or steps of the self-exploration process itself."]},
  {freq:6, q:"What helps a human being transform from animal consciousness to human consciousness?", opts:["Right attitude", "Prosperity", "Right Understanding", "Wealth"], a:2, explanations:["Right attitude is a positive outcome of transformation, but 'Right Understanding' is the foundational and comprehensive solution identified in UHV. A right attitude stems from right understanding.", "Prosperity is a *result* of living in human consciousness (the feeling of having more physical facility with right understanding), not the cause or catalyst for transforming consciousness itself. It follows, rather than precedes, the transformation.", "This is the correct option. The notes state, \"Holistic development is the transformation of consciousness – to human consciousness. Of course, it will necessitate working on all three – right understanding, fulfilment in relationship as well as physical facility; and in that order of priority.\" Right understanding is the first and most crucial step.", "Wealth accumulation is often associated with animal consciousness if pursued solely for physical facility without corresponding right understanding and relationship. Therefore, wealth itself does not lead to transformation to human consciousness."]},
  {freq:5, q:"\"Samridhi\" means", opts:["Happiness", "Wealth", "Prosperity", "Health"], a:2, explanations:["Happiness is defined as a state of 'Harmony' within the self. While both happiness and prosperity are basic human aspirations, they refer to distinct feelings and states in the UHV framework.", "Wealth refers to the accumulation of physical facilities. Prosperity, or Samridhi, is specifically the *feeling* of having more than required physical facility, which involves a right assessment of needs, not just accumulation.", "This is the correct option. The notes explicitly define Samridhi as \"Prosperity is the feeling of having more than required physical facility.\" This feeling arises from correctly assessing physical needs and ensuring their adequate availability.", "Health (Swasthya) is the state of the body, a natural outcome of 'self-regulation' (Sanyam) by the Self. It is distinct from prosperity, which relates to the feeling of having sufficient physical facilities."]},
  {freq:5, q:"Basic human aspirations / continuous happiness and prosperity are the", opts:["Impractical thought", "Impossible desires", "Basic human aspirations", "None of these"], a:2, explanations:["UHV proposes that continuous happiness and prosperity are not merely idealistic or impractical thoughts, but are desirable and achievable goals that every human being naturally accepts as their purpose.", "The course aims to demonstrate that continuous happiness and prosperity are indeed possible and are the fundamental desires of human beings, contradicting the idea that they are impossible desires.", "This is the correct option. The notes state, \"We have a natural acceptance for continuity of happiness and prosperity. These are our basic aspirations.\" They are the fundamental, universal desires of every human being.", "This option is incorrect because continuous happiness and prosperity are explicitly identified as the basic human aspirations within the UHV framework."]},
  {freq:5, q:"Harmony within myself is known as", opts:["Excitement", "Happiness", "Both", "None of the above"], a:1, explanations:["Excitement is described as a momentary feeling resulting from favorable sensations or external feelings. It is short-lived and not sustainable, differing from the continuous state of happiness.", "This is the correct option. The notes state, \"Happiness is to be in a state of harmony.\" When one's internal desires, thoughts, and expectations are in harmony with one's natural acceptance, this leads to a state of happiness within the Self.", "This option is incorrect because excitement is explicitly differentiated from happiness in the notes. Happiness is a harmonious state, while excitement is a temporary sensation.", "This option is incorrect, as happiness is clearly defined as the state of harmony within oneself according to the UHV framework."]},
  {freq:5, q:"Value and skills go hand in hand — is this true?", opts:["Always True", "False", "Cannot tell", "Sometimes true"], a:0, explanations:["This is the correct option. The notes explicitly state: \"Values and skills go hand in hand. Both values and skills are required. There is an essential complementarity between the two.\" This indicates their constant and fundamental relationship for human fulfillment.", "This statement contradicts the core UHV principle that values and skills are complementary and both are necessary for a fulfilling life, with values having priority.", "The notes provide a clear and definite stance on the relationship between values and skills, emphasizing their essential complementarity, so it is not a matter of inability to tell.", "The relationship between values and skills is presented as a fundamental and continuous principle for holistic development, not something that is only occasionally true. They are always required together."]},
  {freq:5, q:"What is the acceptance of excellence in others called?", opts:["Reverence", "Glory", "Gratitude", "Jealous"], a:0, explanations:["This is the correct option. The notes explicitly define \"Reverence is the feeling of acceptance for excellence.\" Excellence refers to the state of continuous happiness with a complete understanding of harmony.", "Glory is the feeling of acceptance for those who have *made effort* for excellence, rather than for the excellence itself. It is about appreciating the journey or contribution of great people.", "Gratitude is the feeling of acceptance for those who have made effort for *my* excellence, specifically acknowledging help received in one's own development.", "Jealousy is a negative feeling and indicates a lack of affection or acceptance for others' achievements, directly opposite to the feeling of reverence for excellence."]},
  {freq:5, q:"Foundational/foundation value in a relationship is", opts:["Respect", "Love", "Trust", "Glory"], a:2, explanations:["Respect, defined as 'right evaluation', is a crucial feeling in relationships, but trust is presented as the very first and most fundamental value upon which all other feelings are built.", "Love is described as the 'complete value', representing the feeling of being related to all. It is the culmination of relationship values, achieved after establishing other foundational feelings.", "This is the correct option. Module 3 clearly states that \"Trust is to be assured that the other intends to make me happy and prosperous.\" This assurance forms the bedrock of any relationship and is explicitly called the 'foundation value'.", "Glory is the feeling of acceptance for those who have made effort for excellence. It is a specific relationship value, not the overarching foundation for all relationships."]},
  {freq:5, q:"Human life / harmony should be maintained at four levels: Self, Family, Society and", opts:["Nature", "Nurture", "World", "Universe"], a:0, explanations:["This is the correct option. The notes specify the four levels of living as: 1. Individual (Self), 2. Family, 3. Society, and 4. Nature/Existence. Harmony must be understood and lived at all these levels.", "Nurture refers to care or development, which is an action or a characteristic, not a distinct level of human living or harmony in the UHV framework.", "While 'world' is part of the broader vision (world family order), 'Nature/Existence' is the specific fourth level explicitly stated in the context of the four levels of living.", "Similar to 'world', 'universe' represents a broader scope. However, 'Nature/Existence' is the precise term used in the UHV notes for the fourth level of harmony in living."]},
  {freq:4, q:"What is the state of liking and a holistic, all-encompassing state of mind that creates inner harmony?", opts:["Prosperity", "Happiness", "Innateness", "Self-organized"], a:1, explanations:["Prosperity is the feeling of having more than required physical facilities. It is related to material well-being, not directly to the inner state of mind that creates harmony.", "This is the correct option. The notes define happiness as \"The state or situation, in which I live, if there is harmony / synergy in it, it is Naturally Acceptable to me to be in that state / situation.\" This perfectly matches the description of a holistic state of mind creating inner harmony.", "Innateness refers to something inherent or a natural acceptance, which is a property of the Self, rather than the state of mind that creates inner harmony.", "Self-organized describes a characteristic of units in existence or the Self when aligned with natural acceptance. It is not the term used to describe the state of mind that creates inner harmony."]},
  {freq:4, q:"All units of nature can be classified into how many orders?", opts:["Two", "Three", "Four", "Six"], a:2, explanations:["Two is an insufficient number to classify all units of nature. The UHV framework defines a more comprehensive classification.", "Three would omit one of the defined orders of nature according to the UHV framework, which explicitly classifies units into four categories.", "This is the correct option. The notes explicitly state: \"All units can be categorised into 4 orders: 1. Physical order… 2. Bio order… 3. Animal order… 4. Human order.\"", "Six is not the number of orders of nature specified in the provided UHV lecture notes. The classification is consistently presented as four orders."]},
  {freq:4, q:"Total number of feelings in human relationship is", opts:["5", "9 (most papers) / 10 or 11 in some", "9", "8"], a:2, explanations:["Five is not the total number of definite feelings in human relationships identified by UHV. The framework specifies a larger, distinct set.", "While this option contains the correct number '9', the additional phrase '10 or 11 in some' introduces ambiguity not present in the strict UHV definition. The curriculum consistently identifies 9 feelings.", "This is the correct option. Module 3 explicitly lists and enumerates nine specific feelings or values in human relationships: Trust, Respect, Affection, Care, Guidance, Reverence, Glory, Gratitude, and Love.", "Eight is an incorrect number as it omits one of the definite feelings in human relationships as per the UHV curriculum."]},
  {freq:4, q:"Right understanding gained through self-exploration enables us to identify the definitiveness of human conduct — this is called", opts:["Ethical Human conduct", "Values", "Policy", "Utility values"], a:0, explanations:["Ethical human conduct is the term used to describe the definitiveness of human conduct that emerges from right understanding gained through self-exploration. This is explicitly stated in the notes as the outcome of right understanding.", "Values are a component of ethical human conduct, which also includes policies and character. They define our participation at different levels, but they are not the conduct itself.", "Policies are a component of ethical human conduct, detailing how to live with human values, including plans and programs. They are not the overall human conduct itself.", "The term 'utility values' is not defined in the provided UHV notes. Ethical human conduct is comprehensive, encompassing values, policy, and character, rather than just utility."]},
  {freq:4, q:"Giving weightage to physical facilities, maximization of sensory pleasures, accumulation of wealth is called", opts:["Animal Consciousness", "Animal Unconsciousness", "Semi-Consciousness", "Human Consciousness"], a:0, explanations:["Living primarily for physical facilities, including the maximization of sensory pleasures and accumulation of wealth, is defined as living with animal consciousness. This is because for animals, physical facility is necessary and adequate, but for humans, it alone is not sufficient for fulfillment.", "The notes define a state of 'animal consciousness' for human beings, not 'animal unconsciousness'. Unconsciousness implies a lack of awareness, which is distinct from actively pursuing physical facilities.", "The notes do not use the term 'semi-consciousness' to describe this state. The core distinction is clearly drawn between 'animal consciousness' and 'human consciousness'.", "Human consciousness involves living with continuous happiness and prosperity by ensuring right understanding, fulfilling relationships, and having adequate physical facilities in the correct priority. It is the opposite of living solely for physical facilities and sensory pleasures."]},
  {freq:4, q:"Sah-Astitva means", opts:["Co-existence", "Co-operation", "Co-option", "Corporate identity"], a:0, explanations:["Sah-Astitva directly translates to 'Co-existence' in the UHV framework. This fundamental reality describes existence as units submerged in all-pervading space, inherently in harmony.", "Co-operation is an activity or behavior that emerges from living in relationship and understanding co-existence, but it is not the fundamental existential reality of Sah-Astitva itself.", "Co-option refers to absorbing someone into a group, which is a social or political process and not related to the existential meaning of Sah-Astitva.", "Corporate identity relates to the image and branding of an organization, which is entirely outside the scope of the UHV definition of Sah-Astitva as a fundamental aspect of existence."]},
  {freq:4, q:"To fulfil Human Aspirations, what is/are necessary?", opts:["Both values and skills", "Values only", "Skills only", "None of these"], a:0, explanations:["Both values and skills are necessary to fulfill human aspirations. Values provide clarity on 'what to do' (our aspirations), while skills provide the competence on 'how to do' (to actualize them). They are complementary and go hand in hand.", "While values are prioritized as they define our aspirations, skills are also explicitly required to actualize those aspirations. Focusing on values alone without the means to implement them would be incomplete.", "Skills alone are deemed insufficient as they only provide the 'how to do' without addressing 'what to do', potentially leading to misdirection or exploitation. The present education system is critiqued for being skill-biased without a base of values.", "This option is incorrect because the notes clearly state that both values and skills are essential and complementary for fulfilling human aspirations."]},
  {freq:4, q:"Right understanding + Physical facilities in human being leads to", opts:["Mutual property", "Mutual happiness", "Mutual fulfillment", "Mutual benefit"], a:2, explanations:["Mutual property is not a term used in the UHV framework to describe the outcome of right understanding and physical facilities. The focus is on a deeper sense of fulfillment rather than mere shared ownership.", "Mutual happiness is achieved through right understanding and fulfilling relationships with other human beings. While physical facilities support overall well-being, 'mutual happiness' is primarily relational.", "Right understanding and appropriate physical facilities, when prioritized correctly, lead to mutual fulfillment. Right understanding enables mutual happiness through relationships and helps identify needs for mutual prosperity from physical facilities, leading to a state of overall fulfillment.", "Mutual benefit implies transactional gain for both parties. UHV emphasizes a holistic 'mutual fulfillment' that encompasses happiness and prosperity, extending beyond simple transactional benefits."]},
  {freq:4, q:"Word 'Ethics' comes from", opts:["Ethos", "Eternity", "Elementary", "Essentiality"], a:0, explanations:["The word 'Ethics' is derived from the Greek word 'Ethos,' meaning character or custom. This is a common etymological origin for the term 'ethics' in general, forming the basis for 'ethical human conduct' in UHV.", "Eternity refers to infinite time, which is unrelated to the etymological origin of the word 'ethics.'", "Elementary means basic or fundamental, but it is not the root word from which 'ethics' is derived.", "Essentiality refers to the quality of being essential, but it is not the linguistic root of the word 'ethics.'"]},
  {freq:3, q:"To maintain harmony, we work at four levels. Identify second level of living.", opts:["Self", "Family", "Nature", "Society"], a:1, explanations:["The Self (individual human being) is the first level of living, not the second. Harmony begins within the individual before extending outwards.", "Family is identified as the second level of living in the framework for achieving continuous happiness. Understanding and living in harmony starts with the individual and then extends to the family.", "Nature (or Nature/Existence) is the fourth and final level of living for a human being in the comprehensive framework, encompassing the harmony with the entire existence.", "Society is the third level of living, extending the harmony from the family to the broader community and human interactions."]},
  {freq:3, q:"What is the fourth level of living?", opts:["Society", "Individual", "Family", "Nature"], a:3, explanations:["Society is the third level of living, where harmony extends beyond the family to the broader social order.", "Individual is the first level of living, focusing on harmony within the Self and with the Body.", "Family is the second level of living, where initial experiences of relationship and harmony are cultivated.", "Nature (or Nature/Existence) is the fourth level of living, involving understanding and living in mutual fulfillment with all units in existence."]},
  {freq:3, q:"What is the first level of living?", opts:["Society", "Individual", "Family", "Nature"], a:1, explanations:["Society is the third level of living in the UHV framework, following the individual and the family.", "The Individual (Self) is the first and most fundamental level of living where human beings must strive for harmony, encompassing internal harmony and harmony with the body.", "Family is the second level of living, building upon the individual's harmony and serving as the basic unit of human interaction.", "Nature (or Nature/Existence) is the fourth and most expansive level of living, representing harmony with the entire cosmos."]},
  {freq:3, q:"Beliefs come to us from...", opts:["What we read", "What we see", "What parents/friends talk about", "All the above"], a:3, explanations:["What we read is a source of beliefs, as ideas and notions from society are often transmitted through written material. However, it is not the sole source.", "What we see, through our senses, can also contribute to the formation of beliefs or 'preconditionings' by influencing our perceptions and assumptions. Yet, it is not the only source.", "What parents and friends talk about (family and social interactions) are significant sources of beliefs, as individuals often adopt values and notions from those close to them without critical verification. This is a key aspect of preconditioning.", "Beliefs, or 'preconditionings,' are largely absorbed from various external sources in our environment, including what we read, observe, and hear from family, friends, and society. Therefore, all these factors contribute to how beliefs are formed."]},
  {freq:3, q:"One of the basic desires of every human being is to be always...", opts:["Happy", "Sad", "Laugh", "Earn money"], a:0, explanations:["One of the basic desires (aspirations) of every human being is to be continuously happy. This is a natural acceptance, meaning all human beings inherently want to be happy and desire its continuity.", "No human being naturally desires to be sad. Sadness is a state of disharmony or contradiction, which is naturally unacceptable and something people actively try to avoid.", "Laughter is an expression of happiness, not the fundamental desire itself. While people enjoy laughing, the underlying desire is for the state of happiness that prompts such expressions.", "Earning money is a means to acquire physical facilities, which are necessary for the body and contribute to prosperity. However, it is a means to an end, not the ultimate basic desire of a human being, which is continuous happiness and prosperity."]},
  {freq:3, q:"Sensation is the perception associated with stimulation of a sense organ or specific body condition.", opts:["Happiness", "Recognizing", "Sensation", "All of the above"], a:2, explanations:["Happiness is a state of harmony within the Self, distinct from the physical input received through sense organs. It is a qualitative feeling, not a physiological perception.", "Recognizing is an activity of both the Self and the Body, involving identifying something. However, 'sensation' specifically defines the perception from sense organ stimulation, making it a more precise fit for the definition provided.", "Sensation is precisely defined in UHV as the information or perception received by the Self from the Body through the five sense organs (sound, touch, sight, taste, smell) or from specific body conditions. This matches the statement perfectly.", "While sensation is a part of human experience, this option is incorrect because the specific definition provided in the question accurately describes only 'sensation,' not a combination of 'all of the above.'"]},
  {freq:3, q:"Harmony among the body parts is known as", opts:["Sanyam", "Swasthya", "Synchronization", "None"], a:1, explanations:["Sanyam (Self-regulation) is the *feeling of responsibility* in the Self towards the Body for its nurturing, protection, and right utilization. It is not the state of harmony among body parts itself, but rather the internal disposition that leads to it.", "Swasthya (Health) is the natural outcome when the Self has the feeling of self-regulation and the Body is able to perform as per the instructions of the Self, with all its parts in harmony amongst each other. Therefore, harmony among the body parts is known as Swasthya.", "Synchronization refers to the coordinated timing of different parts working together. While a healthy body demonstrates synchronization, 'Swasthya' is the specific UHV term for the overall state of harmony and order among the body parts.", "This option is incorrect because 'Swasthya' is the defined term in UHV for harmony among body parts."]},
  {freq:3, q:"What is the reason for problems in our relationship with various entities?", opts:["Assumptions", "Misunderstanding", "Preconditioning", "None of these"], a:0, explanations:["Problems in our relationship with various entities are fundamentally due to 'assumptions without knowing'. When we act based on unverified assumptions about ourselves or others, it leads to indefinite conduct and disharmony.", "Misunderstanding is a consequence of operating on unverified assumptions. While it directly causes problems in relationships, the root cause identified in UHV is the act of 'assuming without knowing' rather than the misunderstanding itself.", "Preconditioning refers to the beliefs, notions, or ideas we have absorbed from our environment without proper verification. It is a major *source* of the unverified assumptions that lead to problems, but not the problem itself.", "This option is incorrect because 'assumptions' is identified as the fundamental reason for problems in relationships within the UHV framework."]},
  {freq:3, q:"Employing the body physically for production/maintenance of physical facilities is called", opts:["Labour", "Work", "Skill", "None"], a:1, explanations:["Labour is defined as the physical effort or work done. In UHV, 'work' is a broader term encompassing the entire process of engaging with nature to produce or maintain physical facilities, often using labour.", "Work is the specific UHV term for the effort a human being does on the rest of nature to produce or maintain physical facilities. This activity contributes to mutual prosperity when done in a mutually enriching and cyclic manner.", "Skill refers to the *ability* or expertise required to perform a task, including work or labour. It is the competence to execute, not the act of employing the body itself for production or maintenance.", "This option is incorrect as 'Work' is the precise term used in the UHV notes to describe this activity."]},
  {freq:3, q:"Innovation, in its modern meaning, is", opts:["Novelty", "Newness", "Innovation", "Neatness"], a:2, explanations:["Novelty refers to the quality of being new or original. While innovation often embodies novelty, it is more precisely the successful introduction of new ideas, methods, or products, rather than just the quality of being new.", "Newness is the state of being recently made or discovered. Similar to novelty, it describes a characteristic of innovation but is not the term that defines 'innovation' itself.", "Innovation, in its modern meaning, refers to the introduction of new methods, ideas, or products. The UHV notes use the term in its standard, contemporary sense when discussing human aspirations for progress and development.", "Neatness pertains to tidiness, order, or precision. This concept is unrelated to the process or outcome of introducing new ideas, methods, or products."]},
  {freq:3, q:"The form of ethics helping professionals decide what to do in a moral/ethical dilemma is", opts:["Organizational ethics", "Professional ethics", "Business ethics", "Ethical climate"], a:1, explanations:["Organizational ethics deals with the ethical principles and standards that guide the overall operation and culture of an organization. It is broader than guiding individual professionals in specific dilemmas.", "Professional ethics is specifically concerned with the moral principles and standards that guide the conduct of individuals within a particular profession. It provides a framework for professionals to navigate ethical dilemmas in their specialized field.", "Business ethics is a branch of applied ethics focusing on ethical questions that arise in a business context. While it may include professional ethics, it is a broader category that covers the entire business environment.", "Ethical climate refers to the shared perceptions among employees about how ethical issues should be handled in an organization. It describes the workplace environment rather than a prescriptive form of ethics for decision-making."]},
  {freq:3, q:"For professionals to be trustworthy is a matter of both ethics and", opts:["Morals", "Values", "Competence", "None"], a:2, explanations:["Morals are personal principles regarding right and wrong conduct. While ethical conduct is essential, trustworthiness in a professional context requires more than just good moral intentions; it demands the ability to deliver.", "Values are fundamental beliefs that guide attitudes and actions. Ethical conduct is based on values, but true professional trustworthiness also depends on the capacity to execute responsibilities effectively.", "For professionals to be trustworthy, they must not only possess ethical conduct (right intention and values) but also have the competence (ability and skill) to perform their duties effectively and reliably. Trustworthiness relies on both 'what to do' (ethics) and 'how to do' (competence).", "This option is incorrect because 'competence' is a vital complementary aspect to ethics for a professional to be truly trustworthy."]},
  {freq:3, q:"Accountability means being responsible for the choices you make (engineers' value highlighted)", opts:["Responsibility", "Honestly", "Loyalty", "Reliability"], a:0, explanations:["Accountability inherently means being responsible for one's actions, decisions, and outcomes. In UHV, responsibility is emphasized in various contexts, such as the Self's responsibility towards the Body (self-regulation) or towards relationships.", "Honesty is the quality of being truthful and sincere. While essential for ethical conduct, honesty is a specific virtue and not synonymous with the broader concept of being answerable for choices made.", "Loyalty refers to faithfulness or commitment to a person, group, or cause. An engineer's loyalty is desirable, but it does not define the act of being accountable for their specific choices and actions.", "Reliability implies consistency in performance and dependability. While a reliable engineer is valuable, reliability describes consistent output rather than the obligation to account for decisions."]},
  {freq:3, q:"A written statement of policies and principles guiding behavior of all employees is called", opts:["Code of ethics", "Word of ethics", "Ethical dilemma", "None"], a:0, explanations:["A code of ethics is a formal, written document that outlines the ethical guidelines, principles, and standards of conduct expected from employees or members of an organization or profession. This is explicitly mentioned in the UHV notes in the context of professional ethics.", "This is not a recognized term in the context of professional or business ethics. It is a fabricated distractor.", "An ethical dilemma is a complex situation where choosing between two moral imperatives results in violating another. It describes a situation, not a written guide for behavior.", "This option is incorrect because 'Code of ethics' is the precise and widely accepted term for such a written statement."]},
  {freq:3, q:"Competence in professional ethics refers to", opts:["Ability to utilize power effectively", "Ability to augment universal human order", "Ability to make profit", "None"], a:1, explanations:["While the ability to utilize power effectively is a skill, in the UHV framework, competence in professional ethics is about ensuring this power is used for ethical ends, not just effectively. It is not the ultimate definition on its own.", "Competence in professional ethics, within the UHV framework, is defined as the ability to align one's professional skills and conduct with the comprehensive human goal, thereby contributing to the development and strengthening of a harmonious universal human order.", "The UHV framework explicitly critiques the sole pursuit of profit maximization, which is seen as an outcome of animal consciousness. Professional ethics is about a broader contribution to human welfare and harmony, not just financial gain.", "This option is incorrect as 'Ability to augment universal human order' is a key aspect of competence in professional ethics as defined in UHV."]},
  {freq:3, q:"Which can never be justified and could leave no winner — called", opts:["War Ethic", "General Ethic", "Global Ethic", "Codes of Ethic"], a:0, explanations:["War is a state of extreme conflict and opposition, which by its very nature leads to disharmony, suffering, and destruction. From a UHV perspective, it can never be holistically justified as it violates the principle of mutual fulfillment and leaves no true 'winner' in the pursuit of continuous happiness and prosperity.", "General ethic refers to broad moral principles, which can be justified in various contexts and do not inherently describe an unjustifiable, destructive act.", "Global ethic promotes universal moral principles aimed at peace and well-being for all, directly contrasting the idea of an action that leaves no winner. It is a desirable state, not an unjustifiable act.", "Codes of ethic are sets of rules or guidelines for conduct. The term does not describe an action that inherently leads to universal loss and cannot be justified."]},
  {freq:3, q:"Process of value education is essentially", opts:["Self declaration", "Self exploration", "Self only", "None of these"], a:1, explanations:["Self declaration implies stating one's beliefs or values without undergoing a rigorous process of internal verification or external validation. This is contrary to the explorational nature of value education in UHV.", "The process of value education in UHV is fundamentally 'self-exploration'. It involves an internal dialogue to verify proposals based on one's natural acceptance and then validating them experientially in living.", "While the 'Self' is central to value education, calling the process 'self only' is vague and does not capture the dynamic, investigative, and reflective nature of self-exploration as defined in UHV.", "This option is incorrect because 'self-exploration' is explicitly identified as the core process for value education in the UHV notes."]},
  {freq:3, q:"Right understanding can be recognized as it is", opts:["Assuring", "Satisfying", "Universal", "All of these"], a:3, explanations:["Right understanding is recognized as 'assuring' because it brings a sense of certainty, clarity, and peace within the individual. This is one of the three key characteristics, but not the only one.", "Right understanding is recognized as 'satisfying' because it leads to contentment and fulfillment, resolving contradictions and bringing inner harmony. This is another key characteristic, but not the only one.", "Right understanding is recognized as 'universal' because it holds good for all time (past, present, future), all places, and every individual, indicating its invariant and unchanging nature. This is a crucial characteristic, but not the only one.", "Right understanding is characterized by being assuring, satisfying, and universal (across time, space, and individuals). Since all these options describe true characteristics of right understanding, 'All of these' is the correct answer."]},
  {freq:3, q:"Self-exploration is the process to find out 'What I am and What I really want to be' via two mechanisms:", opts:["Realization and understanding", "Natural and verifiable", "Natural acceptance & experimental validation", "Correctable and identifiable"], a:2, explanations:["Realization and understanding are the *outcomes* of self-exploration, representing the deeper clarity achieved. They are the goal of the process, not the mechanisms by which the exploration is carried out.", "Natural and verifiable are *guidelines for the content* of Value Education, ensuring that the proposals are universally applicable and can be tested, rather than being mechanisms of the self-exploration process itself.", "Self-exploration is a two-part process involving verifying proposals on the basis of one's natural acceptance (what is innately acceptable) and then validating them experientially in one's living (checking if they lead to mutual happiness and prosperity).", "Correctable and identifiable are not described in the UHV notes as the specific mechanisms of self-exploration. While the process may lead to correcting one's understanding and identifying true values, these terms do not represent the core methods of natural acceptance and experiential validation."]},
  {freq:3, q:"The third order of nature is", opts:["Material order", "Animal order", "Plant order", "Human order"], a:1, explanations:["The term 'Material order' is not used as a distinct classification in the notes. Instead, the 'Physical order' (including units like air, water, metal) is the first order, consisting of material units.", "The notes classify nature into four orders: Physical order, Bio order (plant order), Animal order, and Human order. Therefore, the Animal order is indeed the third in this classification sequence.", "The 'Plant order' is referred to as the 'Bio order' in the notes and is explicitly listed as the *second* order of nature, not the third.", "The 'Human order', consisting of human beings, is explicitly listed as the *fourth* and final order in the classification of nature, not the third."]},
  {freq:3, q:"Activities in the human body are", opts:["Composition", "Decomposition", "Respiration", "All of these"], a:3, explanations:["Composition (e.g., building up cells and tissues) is an activity of the human body, but it is not the sole activity. The body engages in a multitude of functions continuously.", "Decomposition (e.g., breaking down food, waste removal) is a fundamental activity within the human body. However, it is one of many processes and not all-encompassing on its own.", "Respiration (breathing) is a vital activity for the human body's survival and functioning. While essential, it is also just one of the numerous activities that the body performs.", "The human body, as a material entity, is involved in a continuous array of activities including processes of composition (growth, repair), decomposition (digestion, excretion), and maintaining life functions like respiration. Thus, all listed options are activities of the human body."]},
  {freq:3, q:"The natural outcome of understanding harmony in nature leads to", opts:["Exploitation", "Dominance", "Mutual fulfillment", "Conflict"], a:2, explanations:["Exploitation is a consequence of human beings *not* understanding harmony in nature, leading to resource depletion and environmental problems. It is antithetical to a harmonious relationship with nature.", "Dominance, similar to exploitation, arises from a misconception of humans as masters over nature. It does not reflect a natural outcome of understanding harmony, which emphasizes mutual respect and coexistence.", "The notes explicitly state that there is 'interconnectedness and mutual fulfilment among the four orders in nature'. When human beings understand this inherent harmony, their role is to live accordingly, leading to mutual fulfilment with all orders of nature.", "Conflict (or 'struggle for survival') is a notion explicitly rejected in UHV as the fundamental design of nature. Instead, nature is inherently organized for mutual fulfilment, and conflict is a result of human misunderstanding."]},
  {freq:3, q:"Right understanding helps identify the comprehensive human goal in terms of", opts:["Samadhan", "Samridhi", "Sah-astitva", "All of these"], a:3, explanations:["Samadhan (Resolution or Right Understanding and Right Feeling) is the human goal at the individual level, leading to happiness. While a crucial part, it's only one component of the comprehensive goal, which spans all levels of living.", "Samridhi (Prosperity) is the human goal at the family level, defined as the feeling of having more than required physical facility. This is a correct part of the comprehensive goal but does not encompass its entirety.", "Sah-astitva (Co-existence) is the human goal at the level of nature/existence, signifying mutual fulfilment. This is also a correct part of the comprehensive goal but is not the complete picture.", "The comprehensive human goal includes Samadhan (Right Understanding and Right Feeling) at the individual level, Samridhi (Prosperity) at the family level, Fearlessness (Trust) in society, and Sah-astitva (Co-existence) in nature/existence. Therefore, all these terms represent aspects of the overall goal."]},
  {freq:3, q:"Globalization is defined as", opts:["Nationalization", "Glocalization", "Global linking", "National economies/business systems becoming deeply interlinked"], a:3, explanations:["Nationalization refers to the process of transferring a private industry or asset to public ownership or control. This is distinct from globalization, which involves the increasing interconnectedness between nations.", "Glocalization is the practice of conducting business according to both local and global considerations, adapting global products or services to local conditions. It is a strategy within globalization, not its overarching definition.", "Global linking is a vague term. While globalization involves various forms of global linking, it is more specifically defined by the deep and extensive interlinking of systems like economies and businesses.", "Globalization is fundamentally defined as the process by which national economies, cultures, and populations become increasingly interconnected and interdependent, particularly through cross-border trade, technology, and flows of investment, people, and information."]},
  {freq:3, q:"First owner of a book's copyright is", opts:["Author", "Publisher", "Translator", "Printing press owner"], a:0, explanations:["Under copyright law, the individual who originally creates a literary work, such as a book, is legally recognized as the first owner of the copyright, granting them exclusive rights over its use and distribution.", "The publisher typically acquires specific rights from the author, often through a contract, to reproduce, market, and distribute the book. They are not the *initial* owner of the copyright, but a licensee.", "A translator creates a 'derivative work' based on an original. While they hold copyright over their specific translation, the copyright of the original book's content remains with its author.", "The printing press owner is responsible for the physical manufacturing of the book. Their role does not involve ownership of the intellectual property embodied in the book's content."]},
  {freq:3, q:"Patent cannot be granted for the prohibited subject:", opts:["Traditional knowledge", "Arms", "Atomic energy", "Junk food"], a:2, explanations:["While the protection of traditional knowledge is a complex legal area, and traditional knowledge itself may not be patentable if it's already public, it is not broadly prohibited as a *subject* for patent applications in the same strict sense as certain other fields.", "Inventions related to arms and weaponry are generally patentable, although their manufacturing, trade, and use are heavily regulated due to national security implications and ethical considerations.", "In many jurisdictions, including India, inventions related to atomic energy are specifically excluded from patentability. This prohibition is primarily based on national security and public interest concerns, to prevent the monopolization of critical technologies.", "There is no general prohibition on patenting inventions related to food, including 'junk food.' Patents can be granted for novel and inventive food products, processes, or compositions, provided they meet standard patentability criteria."]},
  {freq:2, q:"Identify the solution which helps human beings transform from animal to human consciousness.", opts:["Right understanding", "Realization", "Value education", "Physical facilities"], a:0, explanations:["Right understanding is identified as the foundational solution. It is the first priority among the three requirements (right understanding, relationship, physical facility) and is essential for holistic development and the transformation from animal to human consciousness.", "Realization is a higher state of understanding, such as the realization of co-existence, that arises *from* the process of right understanding. It is a result or an achievement, not the initial solution itself.", "Value education is the *process* or the *means* through which right understanding is developed and facilitated. While crucial, it is the educational framework, not the direct solution in terms of a state of being.", "Physical facilities are necessary for human beings but are insufficient for transformation. Living solely for physical facilities is characteristic of animal consciousness, so they cannot be the solution for transforming *away* from it."]},
  {freq:2, q:"What are the basic desires of every human being for which they are working?", opts:["Physical facilities", "Realization and understanding", "Happiness and prosperity", "Continuous happiness and prosperity"], a:3, explanations:["Physical facilities are necessary for human beings, but they are not the ultimate basic desire. Humans often mistakenly assume that happiness and prosperity will automatically result from accumulating physical facilities, yet physical facilities alone are inadequate for sustained fulfillment.", "Realization and understanding are critical *means* to achieve continuous happiness and prosperity. They facilitate the clarity required for fulfillment but are not the fundamental desires themselves.", "While happiness and prosperity are aspirations, the UHV framework specifically highlights the desire for their *continuity*. Fleeting moments of happiness or transient prosperity do not fulfill the deepest human aspiration.", "The notes clearly state that every human being has a natural acceptance for the 'continuity of happiness and prosperity'. These are explicitly identified as the basic human aspirations for which all individuals are ultimately working."]},
  {freq:2, q:"What is the main component of our program to understand and live in harmony at all levels of living?", opts:["Right Understanding", "Relationship", "Self-exploration", "Physical facilities"], a:0, explanations:["Right Understanding is identified as the first and most fundamental priority among the three core requirements (Right Understanding, Relationship, Physical Facility). It forms the basis for correctly understanding and living in harmony at all four levels of being.", "Relationship is the second priority, ensuring mutual happiness in human-human interactions. While crucial for societal harmony, it is not the overarching main component that underpins all levels of living, including individual self-harmony.", "Self-exploration is the *process* or *methodology* used to attain right understanding. It is a means to achieve the main component (right understanding), not the component itself.", "Physical facilities are the third priority and are necessary for mutual prosperity with nature. However, they are insufficient for comprehensive harmony across all levels and are dependent on right understanding for their proper identification and utilization."]},
  {freq:2, q:"The 'Self' is central to human existence and ___ is central to existence.", opts:["Coexistence", "Nature", "Struggle", "Society"], a:0, explanations:["The notes define Existence as 'Co-existence – Units submerged in Space'. Just as the 'Self' is the conscious core of a human being, 'Co-existence' is presented as the fundamental, all-pervading truth that defines the entire existence.", "Nature is described as the 'collection of all the units' within existence (Physical, Bio, Animal, Human orders). While an integral part of existence, nature itself is not considered the central defining principle in the same ultimate sense as co-existence.", "The concept of 'struggle' (e.g., 'struggle for survival') is explicitly rejected by UHV as a fundamental characteristic of nature or existence. Instead, the inherent design is one of mutual fulfillment and harmony, not conflict.", "Society is one of the four levels of human living and is an extension of the family. It is a human construct within the larger order of nature and existence, not the central principle of existence itself."]},
  {freq:2, q:"What is the perception associated with stimulation of a sense organ called?", opts:["Happiness", "Recognizing", "Sensation", "All of the above"], a:2, explanations:["Happiness is defined as a state of harmony or synergy within oneself, not merely a perception arising from the stimulation of a sense organ. It is a deeper, continuous state of being aligned with one's natural acceptance.", "Recognizing is an activity of the Self and the Body where a unit identifies its relationship with another unit. While it involves processing information, it is a step in the overall response rather than the initial perception from a sense organ itself.", "Sensation is the information we receive from the Body through our five sense organs (sound, touch, sight, taste, and smell). This direct input from the body is a major source of our imagination and desire, particularly when seeking momentary pleasure or excitement.", "This option is incorrect because happiness is a state of harmony and recognizing is an activity of perception and fulfillment, neither of which precisely describes the initial perception associated with the stimulation of a sense organ."]},
  {freq:2, q:"Human to rest of nature interaction is called", opts:["Work", "Behavior", "Production", "System"], a:0, explanations:["Work is explicitly defined as the effort a human being does on the rest of nature. This interaction results in the production of physical facilities, and when done ethically, it leads to mutual prosperity and enrichment of nature.", "Behavior refers specifically to human-human interaction, which is governed by feelings in relationships and aims for mutual happiness. It is distinct from interaction with the rest of nature.", "Production is the physical facility obtained from work done on nature. It is the *outcome* of the interaction, rather than the interaction itself. Work is the activity, production is the result.", "System refers to larger organizational structures or dimensions of human order in society (like education-sanskar or justice-preservation), not the direct interaction between human beings and nature."]},
  {freq:2, q:"What types of families do we see in cities mostly?", opts:["Nuclear Family", "Joint family", "Matrilineal family", "All of the above"], a:0, explanations:["The provided UHV notes do not explicitly categorize family types prevalent in cities. However, the notes mention the 'breaking up of joint families' as a societal problem, which implicitly suggests that nuclear families or smaller family units might be more common, particularly in urban settings, although this is not directly stated in the text.", "The notes discuss joint families, particularly in the context of their breaking up being a societal problem. While joint families exist, the notes do not state they are the most common in cities.", "The term 'Matrilineal family' is not mentioned or discussed within the provided UHV lecture notes as a type of family structure, let alone one prevalent in cities.", "This option is incorrect as the notes do not provide a direct answer or classification for family types seen mostly in cities, although the mention of 'breaking up of joint families' implies a shift towards other forms."]},
  {freq:2, q:"What is the result of family feuds?", opts:["Depression", "Anxiety", "Sleeplessness", "All of the above"], a:3, explanations:["Family feuds arise from contradictions and conflicts in relationships, which the notes state directly lead to 'tension, frustration, depression, one-upmanship, psycho-somatic disorders'. Thus, depression is a direct result.", "Similar to depression, anxiety is a psychological distress that results from internal contradictions and conflicts within relationships, which are exacerbated by family feuds, as indicated by the notes' mention of 'tension' and 'psycho-somatic disorders'.", "Sleeplessness is a common physiological symptom of stress, tension, and anxiety that arises from unresolved conflicts and disharmony in relationships, such as family feuds. It falls under the umbrella of 'psycho-somatic disorders' mentioned in the notes.", "Family feuds are manifestations of disharmony and contradiction in relationships. The notes link such conflicts to 'tension, frustration, depression, one-upmanship, psycho-somatic disorders'. Therefore, depression, anxiety, and sleeplessness (as components of psychological distress and psycho-somatic issues) are all potential results."]},
  {freq:2, q:"Which are tricks for peace in family?", opts:["Learn to respect each other's thoughts", "Never take relations as granted", "Both a and b", "Only a"], a:2, explanations:["Learning to respect each other's thoughts aligns with the UHV principle that 'Respect is right evaluation', which includes recognizing that the other is similar in purpose, program, and potential. Respecting thoughts contributes to mutual happiness in relationships.", "Never taking relations for granted emphasizes the continuous need to recognize and fulfill relationships, rather than assuming they will sustain without conscious effort. This aligns with the UHV understanding that relationship 'is already there, we only need to understand it' and 'fulfil it'.", "While the term 'tricks' is not used in UHV, both 'learning to respect each other's thoughts' and 'never taking relations as granted' are fundamental principles from the notes that contribute to establishing and maintaining harmony and peace in a family by ensuring right understanding and fulfillment in relationships.", "This option is incomplete. Both respecting thoughts and actively fulfilling relationships (not taking them for granted) are crucial for family harmony, making 'both a and b' a more comprehensive answer based on UHV principles."]},
  {freq:2, q:"Following is NOT the unit of harmony in nature:", opts:["Soil", "Bird", "Human", "Air"], a:2, explanations:["Soil is a unit of the Physical Order, which is one of the four orders of nature. The notes state that the first three orders (Physical, Bio, Animal) are mutually fulfilling, thus contributing to harmony in nature.", "A bird is a unit of the Animal Order, another of the four orders of nature. Animals are described as participating in mutual fulfillment with other orders, thus contributing to harmony in nature.", "While human beings have the potential and natural acceptance to live in harmony, the notes explicitly state that 'Human being is not only unfulfilling for the other three orders, rather it is dominating and exploiting them'. Therefore, from a practical standpoint in the current scenario, humans are often a source of disharmony, and thus currently 'NOT the unit of harmony' in practice.", "Air is a unit of the Physical Order, just like soil. It participates in mutually fulfilling relationships with other orders, such as nurturing plants, and thus contributes to harmony in nature."]},
  {freq:2, q:"Nature is organised such that physical facility required for any order is available in abundance — True or False?", opts:["True", "False", "-", "-"], a:0, explanations:["The notes explicitly state that 'Nature is organised in such a manner that the physical facility required for any order is available in abundance.' This includes the quantity of physical order being greater than the bio order, and so on, down to the human order.", "This statement contradicts the core UHV teaching that nature inherently provides for all orders in abundance. The problem is not lack of resources, but rather human misunderstanding and misuse.", "This option is not applicable for a true/false question.", "This option is not applicable for a true/false question."]},
  {freq:2, q:"The efforts of an individual to have a systematic arrangement of the entire universe, initiating from the individual, is called", opts:["Universal human order", "Universal human education", "Universal human constitute", "None"], a:0, explanations:["Universal Human Order describes the harmonious networking between the basic unit (family) and their clusters, successively moving from family order to world family order. It is the societal manifestation of living in co-existence, creating a systematic arrangement of the entire existence based on right understanding.", "Universal human education is the means or process to develop right understanding and competence in human beings. It facilitates the transformation towards human consciousness, but it is not the systematic arrangement of the universe itself.", "Humanistic Constitution is a policy framework that provides clear guidance for human welfare and the development of an un-fragmented human society. It is a basis for the order, but not the order itself spanning the entire universe.", "This option is incorrect because 'Universal human order' accurately describes the systematic arrangement of the entire universe, initiated by individual understanding and extending through society, as described in UHV."]},
  {freq:2, q:"Rama returns borrowed money as promised — example of", opts:["Professional ethic", "Personnel ethic", "Both A & B", "None"], a:2, explanations:["If Rama's profession involves financial dealings or trust, her act of returning borrowed money as promised would be a direct demonstration of professional ethics. It shows integrity and reliability, crucial aspects of ethical conduct in any profession.", "Personnel ethics (or personal ethics) refers to an individual's moral principles and values that guide their behavior. Rama's act of returning money as promised is a clear example of personal integrity and trustworthiness, which are core ethical values.", "Returning borrowed money as promised is an act rooted in trustworthiness and integrity. These qualities are fundamental to both personal conduct ('personnel ethic') and professional conduct ('professional ethic'), as ethical behavior should ideally pervade all aspects of a human being's life. Therefore, it is an example of both.", "This option is incorrect because the act clearly exemplifies ethical behavior that is relevant to both personal and professional spheres, making 'Both A & B' the most fitting answer."]},
  {freq:2, q:"Theory/principle of ethics that go parallel:", opts:["Beneficence and theory of virtue ethics", "Fiduciary and principles theory of ethics", "Justice and Kantianism theory", "Respect for Autonomy and critical theory"], a:0, explanations:["The terms 'Beneficence' and 'theory of virtue ethics', along with other specific ethical theories mentioned in the options, are not defined or discussed within the provided Universal Human Values lecture notes. UHV establishes its own framework for ethical human conduct based on right understanding and natural acceptance rather than comparative study of Western philosophical ethics.", "The terms 'Fiduciary' and 'principles theory of ethics' are not part of the core UHV curriculum as presented in the provided notes. UHV's approach to ethics stems from an understanding of harmony and co-existence, rather than established external theories.", "'Justice' in UHV is defined as the recognition, fulfillment, and evaluation of human-human relationships leading to mutual happiness. 'Kantianism theory' is a specific Western ethical framework not covered in the notes, making a direct parallel within the scope of the provided material impossible.", "The terms 'Respect for Autonomy' and 'critical theory' are not introduced or explained in the provided UHV lecture notes. Therefore, based on the given source material, it is not possible to draw connections between these specific ethical theories."]},
  {freq:2, q:"Complex/rapidly changing innovation in engineering leads to", opts:["Need for rigid ethics", "Need for adaptive engineering", "Unfamiliar ethical circumstances", "Both b and c"], a:3, explanations:["UHV emphasizes ethical human conduct derived from right understanding, which is definite yet flexible. A 'rigid ethics' would likely struggle to adapt to new scenarios created by complex innovations, potentially causing more conflict rather than harmony.", "Rapid technological change often necessitates that engineering approaches themselves become more adaptive to address new problems and contexts. While 'adaptive engineering' isn't explicitly defined, the need for adaptability is implicit when addressing the evolving challenges posed by innovation.", "When innovations introduce entirely new capabilities or interactions, existing ethical guidelines may not fully cover the implications. This creates 'unfamiliar ethical circumstances' and dilemmas that require deeper reflection and right understanding, a concept aligned with the UHV emphasis on understanding the long-term impact of actions.", "Complex and rapidly changing innovation in engineering often leads to both the need for engineering practices to adapt ('adaptive engineering') and the emergence of new, challenging ethical questions not encountered before ('unfamiliar ethical circumstances'). The notes highlight how a lack of a holistic worldview in innovation can lead to 'counterproductive' outcomes and 'human welfare' issues, implying both technical and ethical adaptation are required."]},
  {freq:2, q:"Most accurate statement about ethics and law:", opts:["Ethical behavior at times may be illegal", "Legal standards always = ethical benchmark", "Legal is always ethical", "None"], a:0, explanations:["Ethical behavior, based on right understanding and universal human values, sometimes goes beyond legal requirements or may even, in rare cases (e.g., principled civil disobedience), conflict with existing laws. The UHV perspective is that ethical conduct is 'self-satisfying, people-friendly, eco-friendly and universal,' which may not always be perfectly aligned with every law at a given time.", "This statement is inaccurate. Legal standards typically represent a minimum acceptable behavior, while ethical benchmarks, derived from deep understanding of human values and harmony, often strive for a higher, more comprehensive standard of conduct.", "This statement is incorrect. An action can be legal (not forbidden by law) but still be considered unethical if it causes harm, disrespect, or exploits others, even if within legal bounds. Ethics is a broader concept than legality.", "This option is incorrect because the statement 'Ethical behavior at times may be illegal' accurately reflects the nuanced relationship between ethics and law, where ethical considerations can extend beyond legal dictates."]},
  {freq:2, q:"Investment professionals have a special responsibility to act ethically because", opts:["Industry heavily regulated", "Profession adopted a code of ethics", "They are entrusted to protect client's assets", "None"], a:2, explanations:["While the industry is regulated, ethical conduct in UHV stems from an individual's right understanding and commitment, not merely external rules. Regulation is a symptom of lacking ethical conduct, not its root cause or primary motivator.", "A code of ethics provides guidelines, but the fundamental reason for ethical action is the professional's intrinsic responsibility and commitment to human values, ensuring mutual fulfillment, rather than just adherence to a document. Codes define, but don't create, ethics.", "This is correct. UHV emphasizes trust and responsibility in relationships. Investment professionals are entrusted with clients' financial assets, which places a special responsibility on them to act ethically to protect these assets and ensure the client's prosperity, aligning with the principle of mutual fulfillment.", "This is incorrect because the statement about protecting client's assets clearly identifies a special responsibility, making one of the options a valid reason."]},
  {freq:2, q:"An organization's appropriate tone at the top promoting ethical conduct is example of:", opts:["Ethic sensitivity", "Ethic incentives", "Ethical behavior", "Consequentialist"], a:2, explanations:["Ethical sensitivity refers to the ability to recognize ethical issues. While important, 'tone at the top' is more about the active demonstration and promotion of ethical values by leadership, which is a form of active ethical expression rather than mere recognition.", "Ethic incentives are rewards or motivators for ethical behavior. While incentives might be part of an ethical framework, 'tone at the top' primarily describes the leadership's expressed attitude, example, and commitment, which is a behavioral aspect itself, rather than a system of rewards.", "This is correct. An organization's 'tone at the top' refers to the leadership's demonstrated commitment to ethical principles through their actions, decisions, and communication. This sets a behavioral standard for the entire organization, embodying ethical conduct in practice.", "Consequentialist ethics judges actions based on their outcomes. 'Tone at the top' describes the manner in which ethics are promoted and enacted within an organization, which is a form of behavior, rather than a philosophical approach to evaluating the consequences of actions."]},
  {freq:2, q:"According to Australian Education and Training Dept, Canberra (2006), teachers' code of professional practice is based on how many principles?", opts:["Three", "Five", "Seven", "None"], a:1, explanations:["This is incorrect. The specific number of principles referenced for this code of practice within the UHV curriculum's external details is not three.", "This is correct. According to specific information mentioned in the UHV curriculum's context, the teachers' code of professional practice per the Australian Education and Training Dept. is based on five principles. This is specific factual recall from external references sometimes included in the course.", "This is incorrect. The specific number of principles referenced for this code of practice within the UHV curriculum's external details is not seven.", "This is incorrect, as a specific number of principles (five) is identified for the teachers' code of professional practice in the curriculum's context."]},
  {freq:2, q:"Core values of teaching profession per General Teaching Council of N. Ireland (2004) include", opts:["Trust, Honesty, Commitments", "Respect, Fairness, Equality", "Integrity, Tolerance, Service", "All of the above"], a:3, explanations:["While Trust, Honesty, and Commitments are indeed vital for the teaching profession and align with UHV, this option is incomplete as it does not encompass the full range of core values that would typically be included in a comprehensive professional code of ethics.", "Respect, Fairness, and Equality are crucial values in fostering a harmonious and just educational environment, as highlighted in UHV. However, this option is also incomplete, missing other essential values that define ethical conduct in teaching.", "Integrity, Tolerance, and Service are significant qualities for a professional, reflecting dedication to truthfulness, acceptance of diversity, and contribution to society. Yet, this option is incomplete when considering a full set of core professional values.", "This is correct. In the context of Universal Human Values, a holistic approach to professional ethics would naturally include all the values listed across the other options: Trust, Honesty, Commitments, Respect, Fairness, Equality, Integrity, Tolerance, and Service. These are all naturally acceptable feelings and principles for ensuring mutual fulfillment and competence."]},
  {freq:2, q:"Providing guidance and offering inspiration — both essential roles of a code of ethics?", opts:["No, only guidance", "No, only inspiration", "Both are not essential", "Yes, both are essential"], a:3, explanations:["This is incorrect. A code of ethics is intended to both direct actions (guidance) and motivate individuals to uphold higher standards (inspiration), making both roles essential for comprehensive ethical development.", "This is incorrect. Inspiration alone is insufficient; a code of ethics also needs to provide practical guidance on how to apply ethical principles in specific professional contexts to ensure definite human conduct.", "This is incorrect. Both guidance and inspiration are fundamental functions of a code of ethics, as they work together to inform ethical decision-making and foster a sustained commitment to ethical living.", "This is correct. A code of ethics serves two vital functions: it provides clear guidance on appropriate conduct, helping professionals understand 'what to do', and it offers inspiration by articulating aspirational standards, motivating a deeper commitment to ethical living and self-evolution."]},
  {freq:2, q:"The purpose of value education is to", opts:["Foster universal core values", "Make syllabus easy", "Develop values in individuals", "Both A and C"], a:3, explanations:["This option is partially correct as fostering universal core values is a key aim of value education. However, it is not the complete purpose, as it also focuses on the individual's internal development.", "This is incorrect. The purpose of value education is to facilitate holistic development by providing clarity on human aspirations and values, not to simplify the academic syllabus.", "This option is partially correct. Value education aims to help individuals discover and internalize values. However, it's not just about developing values in individuals, but fostering universal ones relevant to all humanity.", "This is correct. Value education aims to both 'foster universal core values' (A) by making individuals aware of what is universally valuable, and to 'develop values in individuals' (C) by enabling them to understand and live by these values for a fulfilling life."]},
  {freq:2, q:"Once we know what is valuable to us, these values become the anchor for ___.", opts:["Knowledge", "Actions", "Society", "None of these"], a:1, explanations:["Values are understood through knowledge, but knowledge itself is a tool for understanding. Values primarily serve as guiding principles for our subsequent actions rather than anchoring knowledge.", "This is correct. According to UHV, once a human being gains right understanding and identifies what is truly valuable, these values naturally guide all their desires, thoughts, and expectations, thereby becoming the basis or 'anchor' for their behavior and work (actions) in living.", "While values are expressed and lived in society, society is the larger order in which values are manifested, not what the values themselves anchor. Values first anchor individual conduct, which then shapes society.", "This is incorrect because the clear connection between values and actions makes one of the options correct."]},
