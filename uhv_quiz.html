  {freq:2, q:"Which encompassing principles underlie successful implementation of value education? (Conviction, Connection, Critical thinking, Commitment)", opts:["A, C and D only", "B, C and D only", "A, B and D only", "None of these"], a:2, explanations:["This option is incomplete. While conviction, critical thinking, and commitment are important, connection (dialogue) is also a fundamental aspect of the self-exploration process in value education.", "This option is incomplete. While connection, critical thinking, and commitment are vital, conviction, arising from self-verification, is necessary for deeply internalizing values and authentic living.", "This is correct. Successful implementation of value education relies on 'conviction' (A) from self-verification, 'connection' (B) through dialogue between oneself and others, and 'commitment' (D) to live by the understood values. While critical thinking (C) is a tool for rationality, it is often seen as a method within the process, rather than an overarching underlying principle.", "This is incorrect because a specific combination of principles from the given list is identified as underlying the successful implementation of value education."]},
  {freq:2, q:"Human life is lived at four levels: Individual, Family, Society and ___", opts:["Nature", "Nurture", "World", "Universe"], a:0, explanations:["This is correct. Universal Human Values identifies four fundamental levels of human living: as an Individual human being, as a member of a Family, as a member of Society, and as a unit in Nature/Existence. Harmony is sought at all these levels.", "Nurture refers to the process of caring for and encouraging development, which is an activity within human living, not a distinct level of human interaction or existence in the UHV framework.", "While 'world' encompasses aspects of society and nature, the precise term used in UHV to describe the fourth level of human living for ensuring harmony is 'Nature/Existence'.", "While 'universe' is a very broad concept, UHV specifically delineates the four levels of human living and interaction, with 'Nature/Existence' being the term for the broadest level relevant to human harmony."]},
  {freq:2, q:"Any course content on value education needs to be", opts:["Universal", "Rational", "Natural", "All of these"], a:3, explanations:["While universal applicability (to all human beings, at all times and places) is a mandatory guideline for value education content, this option is incomplete as other equally important criteria must also be met.", "While rationality (appealing to reasoning, not blind beliefs) is a crucial guideline for value education content, this option is incomplete as other essential criteria must also be fulfilled.", "While naturalness (naturally acceptable to human beings) and verifiability (experientially validated) are vital guidelines for value education content, this option is incomplete as other essential criteria must also be satisfied.", "This is correct. For value education content to be truly effective and appropriate, it must adhere to all the stated guidelines: it must be Universal, Rational, and Natural and Verifiable. These criteria ensure that the values are deeply understood and adopted by individuals."]},
  {freq:2, q:"Value education enables us to", opts:["Understand our needs", "Visualize our goals correctly", "Indicate direction for fulfillment", "All of the above"], a:3, explanations:["While understanding our needs is a key outcome of value education, it is only one part of a more comprehensive enablement. Value education also guides us towards visualizing goals and fulfilling them, making this option incomplete.", "Visualizing our goals correctly is an important aspect that value education facilitates. However, it also provides clarity on our basic needs and the direction for fulfilling those goals, indicating a broader scope than this single point.", "Indicating the direction for fulfillment is a crucial function of value education, as it helps in devising a program for living in harmony. However, this is built upon understanding needs and visualizing goals, making this option incomplete on its own.", "This is correct. Value education holistically enables us to understand our true needs, visualize our goals accurately for a fulfilling life, and provides the necessary direction for their fulfillment. It addresses the 'what to do' aspect of human existence comprehensively."]},
  {freq:2, q:"I being the —", opts:["Doer, seer and Enjoyer", "Doer", "Seer", "Enjoyer"], a:0, explanations:["This is correct. In UHV, the 'Self' (I) is considered the conscious entity and has three fundamental roles: the 'Seer' (the one that sees/understands), the 'Doer' (the one that takes decisions), and the 'Enjoyer' (the one that experiences happiness or unhappiness). The body is merely an instrument of the Self.", "While the Self is indeed the 'Doer' (the one that takes decisions), this option is incomplete as it omits the equally important roles of the Self as the 'Seer' and the 'Enjoyer' in human existence.", "While the Self is the 'Seer' (the one that understands or sees), this option is incomplete. The Self also takes action (Doer) and experiences the outcome (Enjoyer), which are integral to its identity.", "While the Self is the 'Enjoyer' (the one that experiences happiness or unhappiness), this option is incomplete. It neglects the Self's roles as the 'Seer' and the 'Doer,' which are fundamental to how it interacts with and experiences existence."]},
  {freq:2, q:"Which of the following is NOT a response of the self?", opts:["Knowing", "Assuming", "Recognizing", "Preconditioning"], a:3, explanations:["Knowing is a fundamental activity and response of the Self, enabling direct observation and understanding of reality. It is a key aspect of how the Self interacts with existence.", "Assuming is a response of the Self where it accepts certain ideas or beliefs, which may or may not be based on complete knowing. This activity determines the Self's subsequent recognition and fulfillment.", "Recognizing is an activity of the Self (and also the Body), where it identifies its relationship with other entities. In the Self, recognition is influenced by assuming.", "Preconditioning is a source of imagination for the Self, referring to unverified beliefs or notions adopted from society. It is not a response of the Self, but rather an input that can influence its desires, thoughts, and expectations."]},
  {freq:2, q:"Activities of self (I) are", opts:["Happiness", "Prosperity", "Desire, thought and expectation", "None"], a:2, explanations:["Happiness is the need of the Self and its basic aspiration, not an activity of the Self. It is the state of harmony that the Self strives for.", "Prosperity is the feeling of having more than required physical facilities, which is a goal of the Self when interacting with the Body and nature. It is not an intrinsic activity of the Self.", "Desire, thought, and expectation are the continuous activities of the Self that together constitute imagination. These activities are fundamental to the Self's existence.", "This option is incorrect because 'Desire, thought and expectation' correctly describes the activities of the Self, making 'None' an invalid choice."]},
  {freq:2, q:"The requirement of the body is right utilization and", opts:["Desire", "Nurturing", "Thought", "Expectation"], a:1, explanations:["Desire is an activity of the Self, not a requirement of the Body. The Body requires physical facility, which the Self uses to fulfill its responsibility towards the Body.", "Nurturing is one of the three core responsibilities of the Self towards the Body, along with protection and right utilization. It involves providing appropriate physical inputs like food, water, and air.", "Thought is an activity of the Self, specifically analyzing and comparing possibilities to fulfill desires. It is not a requirement of the material Body.", "Expectation is an activity of the Self, involving selecting based on tasting. It pertains to the Self's imagination, not a direct requirement for the Body's maintenance."]},
  {freq:2, q:"The ___ is an instrument of ___", opts:["I, Body", "Body, I", "Both a and b", "None"], a:1, explanations:["This option is incorrect because the Self ('I') is the sentient entity, the seer, doer, and enjoyer, which *uses* the Body as its instrument. The Body is not an instrument of 'I'.", "The Body is an instrument of the Self ('I'). The Self is central to human existence and uses the Body to express its decisions, behave with other humans, and work with nature.", "This option is incorrect as the relationship is unidirectional: the Body serves the Self. The Self is not an instrument of the Body.", "This option is incorrect because the relationship between the Self and Body as instrument and user is clearly defined in UHV."]},
  {freq:2, q:"The activity of desire, thought and expecting together is called", opts:["Body", "Health", "Imagination", "Future"], a:2, explanations:["The Body is the material component of a human being, with its own distinct needs and activities, but it does not encompass desire, thought, and expectation. These are activities of the Self.", "Health (Swasthya) is a state of harmony in the Body, resulting from the Self's feeling of self-regulation. It is an outcome, not a combination of mental activities.", "Imagination is the collective term for the continuous activities of desire (imaging), thought (analyzing/comparing), and expectation (selecting/tasting) within the Self. It reflects 'what I am'.", "Future refers to a time dimension and is not a term used to describe the combination of desire, thought, and expectation in the Self. These activities are continuous in the present."]},
  {freq:2, q:"Imaging is ___ with time", opts:["Continuous", "Discontinuous", "Random", "Different"], a:0, explanations:["Imaging, which is the activity of desire, is continuous with time in the Self. The activities of desire, thought, and expectation are always ongoing, whether we are aware of them or not.", "This option is incorrect as imaging, as a part of the Self's imagination, is described as continuous, not discontinuous. It is an inherent, unceasing activity.", "While imagination can sometimes feel random or disorganised, the underlying activities of imaging (desire) themselves are continuous. 'Random' describes the *state* of imagination, not its temporal nature.", "This option is incorrect as the continuity of imaging is a fundamental characteristic of the Self, which does not change to become 'different' with time in its inherent nature."]},
  {freq:2, q:"Knowing means having the", opts:["Assumption", "Right understanding", "Right feeling", "None"], a:1, explanations:["Assumption is a belief accepted by the Self, which may or may not be based on complete understanding. Knowing, in contrast, implies seeing reality as it is, leading to right understanding.", "Knowing is the activity of the Self that enables it to see reality as it is, in its completeness, directly and definitely. This leads to right understanding, which is definite, continuous, and universal.", "Right feeling is a state of harmony in the Self, resulting from right understanding and expressed in relationships. While related, knowing is the underlying activity that leads to right understanding, which in turn informs right feeling.", "This option is incorrect as 'right understanding' is the precise definition of 'knowing' within UHV, making 'None' an invalid choice."]},
  {freq:2, q:"Ensuring right understanding and feeling in others is called", opts:["Care", "Affection", "Gratitude", "Guidance"], a:0, explanations:["Care is the feeling of responsibility and commitment for nurturing and protecting the *Body* of one's relative. It focuses on the physical well-being, not the Self-development of the other.", "Affection is the feeling of being related to the other, an acceptance of them as a relative. While it fosters a positive relationship, it doesn't specifically refer to ensuring right understanding and feeling in them.", "Gratitude is the feeling of acceptance for those who have made an effort for *my* excellence, acknowledging their contribution to one's own self-development. It is not about enabling others' understanding.", "Guidance is the feeling of responsibility and commitment for the development of the *Self* of one's relative, specifically by ensuring right understanding and right feeling in them."]},
  {freq:2, q:"Harmony in the family is the building block for harmony in the", opts:["Society", "Individual", "Friend", "Relative"], a:0, explanations:["The family is explicitly identified as the basic unit or building block of human organization. Harmony within the family is foundational for extending harmony to the larger collective, which is society.", "While harmony begins within the individual, the question refers to 'harmony in the family' as a building block for a *larger* order, which is society, not the individual. The individual is prior to the family.", "A friend is an individual in a relationship, but not a collective unit that serves as a general building block for the structure of society in the same way a family does.", "A relative is an individual connected by relationship, usually within a family. The family itself, as a unit, is the building block for the larger societal order."]},
  {freq:2, q:"Comprehensive human goal is right understanding, prosperity, trust (fearlessness) and", opts:["Co-existence", "Happiness", "Abhay", "None"], a:0, explanations:["Co-existence is the fourth component of the comprehensive human goal, achieved at the level of nature and existence, representing mutual fulfillment with all units in nature. This completes the holistic aspiration.", "Happiness is a desired state resulting from right understanding and right feeling in the individual. It is encompassed within the overall goal of 'right understanding and right feeling' for every individual, but is not the distinct fourth component at the macro level.", "Abhaya (fearlessness) is synonymous with trust, which is already listed as the third component of the comprehensive human goal, to be achieved at the level of society.", "This option is incorrect because 'co-existence' is a key component, making 'None' an invalid choice. The four goals are right understanding, prosperity, fearlessness, and co-existence."]},
  {freq:2, q:"There is justice in relationship when there is", opts:["Mutual fulfillment", "Self regulation", "Freedom", "None"], a:0, explanations:["Justice is defined as the recognition, fulfillment, and evaluation of human-human relationships, which ultimately leads to mutual happiness. Mutual fulfillment is the direct outcome and indicator of justice in a relationship.", "Self-regulation (Sanyam) is the feeling of responsibility in the Self towards the Body, ensuring its nurturing, protection, and right utilization. It is related to harmony within the individual, not directly to justice in relationships.", "Freedom, in the context of UHV, refers to the state of being self-organized (Swatantrata), living with continuous happiness. While desirable, it is a broader state of being and not the direct condition for justice in a relationship.", "This option is incorrect because 'mutual fulfillment' is the explicit outcome of justice, making 'None' an invalid choice."]},
  {freq:2, q:"The extension of family is", opts:["Self", "Body", "Society", "Nature"], a:2, explanations:["The Self is the conscious entity within a human being. The family extends to larger social units, not to the individual Self.", "The Body is the material aspect of a human being. The family unit expands to include more human beings in a structured order, which is society, not the physical body.", "Society is understood as an extension of the family, forming successively larger and larger complementary units from family order to world family order. The family is the basic unit from which this societal order develops.", "Nature refers to the collection of all units in existence, including human beings, animals, plants, and physical entities. While human beings live in harmony with nature, 'society' is the direct extension of family in terms of human-human interaction."]},
  {freq:2, q:"Feeling of relatedness to all human beings is called", opts:["Love", "Affection", "Gratitude", "Respect"], a:0, explanations:["Love is defined in UHV as the feeling of being related to everyone, to all human beings. It is considered the complete value among the nine universal feelings in human relationships, representing an expansive sense of connection.", "Affection is the feeling of being related to a particular other. While it is a foundational feeling, love is distinguished as the expansion of this feeling to encompass all beings, making affection a more specific or initial stage.", "Gratitude is the feeling of acceptance and appreciation for those who have made an effort for one's excellence or have helped in one's journey of understanding and living in harmony. It is a specific feeling of thankfulness, not general relatedness.", "Respect is defined as the right evaluation of a person, acknowledging their inherent similarity in purpose, program, and potential. While crucial for healthy relationships, it is a distinct feeling focused on evaluation rather than the overarching feeling of relatedness to all."]},
  {freq:2, q:"According to quantity, order of magnitude in nature:", opts:["Bio>>Physical>>Animal>>Human", "Animal>>Bio>>Physical>>Human", "Physical>>Bio>>Animal>>Human", "None"], a:2, explanations:["This order is incorrect. The UHV framework clearly states that the Physical order is the most abundant, ensuring that the needs of subsequent orders are met. Bio (plant) order, while abundant, is not the largest in magnitude.", "This sequence is incorrect. The Animal order is not more abundant than the Bio (plant) or Physical orders. The natural arrangement in UHV posits that each preceding order provides the necessary resources in abundance for the orders that follow it.", "This option is correct. In Universal Human Values, the four orders of nature are classified by quantity (abundance) in descending order: Physical order (most abundant), followed by Bio (plant) order, then Animal order, and finally Human order (least abundant). This natural hierarchy ensures mutual fulfillment and sustainability.", "This option is incorrect because there is a specific, well-defined order of magnitude for the four orders in nature according to UHV, which is Physical >> Bio >> Animal >> Human."]},
  {freq:2, q:"Systems in nature are", opts:["Cyclic", "Mutually fulfilling", "Both a and b", "None"], a:2, explanations:["Nature's systems operate in cycles, demonstrating phenomena like the water cycle and nutrient recycling, which are vital for maintaining ecological balance and continuity. This characteristic highlights nature's self-regulation.", "All units and orders within nature are interconnected and mutually fulfilling. They support and complement each other, ensuring that the entire existence operates in harmony and sustains itself, which is a core tenet of UHV.", "This option is correct. According to UHV, the systems in nature are characterized as both cyclic and mutually fulfilling. They exhibit cyclical processes for renewal and self-regulation, and all elements within them interact in a way that provides for and enriches one another, maintaining overall harmony.", "This option is incorrect because the systems in nature are explicitly described as cyclic and mutually fulfilling within the Universal Human Values framework, pointing to a definite characteristic."]},
  {freq:2, q:"Natural characteristics/Svabhava of a human being include", opts:["Perseverance", "Bravery", "Generosity", "All of these"], a:3, explanations:["Perseverance (Dheerta) is a natural characteristic of a human being living with human consciousness. It signifies an unwavering commitment to understand and live in harmony at all levels, without being perturbed by external factors.", "Bravery (Veerta) is another natural characteristic, representing the commitment to help others develop right understanding and to live accordingly. It embodies the courage to stand by values and facilitate others' holistic development.", "Generosity (Udaarta) is a natural characteristic of human consciousness, which involves a readiness to invest oneself, one's body, and physical facilities to help others achieve right understanding and live in harmony. It reflects a spirit of selfless giving.", "This option is correct. The natural characteristics (Svabhava) of a human being, when living with human consciousness, are explicitly identified as Perseverance (Dheerta), Bravery (Veerta), and Generosity (Udaarta). These qualities form the basis of ethical human conduct."]},
  {freq:2, q:"The only effective way to ensure professional ethics is by developing", opts:["Knowledge", "Ethical conduct", "Ethical competence", "Professional activities"], a:2, explanations:["While knowledge is a prerequisite, it primarily provides information and understanding. Professional ethics, however, requires the actualization of values and comprehensive understanding, which goes beyond mere intellectual knowledge to include conviction and living it.", "Ethical conduct is the desirable outcome or manifestation of living ethically. It is the behavior itself. However, to *ensure* this conduct consistently, the underlying competence and understanding must first be developed.", "This option is correct. According to UHV, the only effective way to ensure professional ethics is by developing ethical competence in the individual. This competence arises from right understanding, leading to mutually fulfilling behavior and an enriching interaction with nature.", "Professional activities are the domain where ethics are applied. Simply engaging in professional activities does not guarantee ethical outcomes; rather, it is the ethical competence of the individual performing these activities that ensures ethical practice."]},
  {freq:2, q:"Unethical practices in various professions can be resolved", opts:["Through skills", "Through knowledge", "Through practical", "Via right understanding"], a:3, explanations:["Skills are essential for performing professional tasks effectively, but they do not inherently address the root causes of unethical behavior. Unethical practices stem from a lack of right understanding and values, not merely a deficiency in technical skills.", "Knowledge provides factual information and understanding. While foundational, it doesn't guarantee ethical action. Unethical practices often arise from a worldview focused on profit maximization or sensual pleasure, which requires a transformation of understanding rather than just more information.", "Practical training focuses on applying knowledge and skills. However, without the guidance of right understanding, practical application can still lead to unethical outcomes. It is the clarity of purpose and values that directs practice ethically.", "This option is correct. According to UHV, unethical practices in professions are primarily due to a lack of right understanding about human purpose and holistic harmony. Therefore, developing right understanding is the fundamental and most effective way to resolve these issues, as it transforms one's worldview and priorities."]},
  {freq:2, q:"What provides clear guidance/policy framework for an unfragmented human society and universal human order?", opts:["Humanistic education", "Humanistic constitution", "Profession", "Ethical Human conduct"], a:1, explanations:["Humanistic education plays a vital role in fostering right understanding and values in individuals, preparing them to live in a harmonious society. However, it is the constitution that formalizes the principles and policies for societal structure.", "This option is correct. A humanistic constitution provides the essential clear guidance and policy framework necessary for the development of an un-fragmented human society and a universal human order. It ensures that principles of human welfare are universally applicable and facilitate holistic living for all.", "Profession is a means for human beings to participate in the larger order and contribute to society. While ethical professions support a harmonious society, a profession itself does not provide the comprehensive policy framework for societal organization.", "Ethical human conduct is the manifestation of right understanding and values in an individual's behavior. It is an outcome and a component of a harmonious society, but not the overarching constitutional or policy framework for the entire social order."]},
  {freq:2, q:"Primary step toward holistic alternative is to develop right understanding and commitment to", opts:["Do practical", "Remain calm", "Live accordingly", "Teach others"], a:2, explanations:["While practical application is a necessary part of actualizing right understanding, the immediate commitment following its development is to integrate it into one's way of life. 'Living accordingly' encompasses the practical actions, but is a broader commitment.", "Remaining calm can be a desirable state achieved through right understanding, but it is not the primary commitment itself. The commitment involves an active engagement to align one's existence with the newly gained understanding.", "This option is correct. The primary step towards adopting a holistic alternative is to develop right understanding and a subsequent commitment to live accordingly. This involves integrating the understanding of harmony into one's thoughts, behavior, work, and participation at all levels of existence.", "Teaching others is an important social responsibility that may follow right understanding and living accordingly. However, the first and primary commitment for an individual is to actualize the understanding within themselves by living in harmony."]},
  {freq:2, q:"Humanistic education will facilitate self-exploration leading to continuous", opts:["Education", "Self evolution", "Development", "People friendly"], a:1, explanations:["Education is the medium through which humanistic principles are imparted, but it is not the ultimate outcome of self-exploration. Humanistic education *enables* self-exploration, which in turn leads to a deeper, more profound change.", "This option is correct. Humanistic education facilitates the process of self-exploration, which is a continuous journey of self-discovery and understanding. This process ultimately leads to continuous self-evolution, meaning a progressive qualitative transformation in the human being towards holistic living and human consciousness.", "Development is a general term for growth or progress. While self-evolution is a form of development, 'self-evolution' specifically denotes a qualitative transformation and refinement of the Self, driven by internal understanding and natural acceptance.", "Being people-friendly is a desirable quality and an outcome of living with right understanding and values. It is a characteristic of ethical human conduct that manifests from the process of self-evolution, rather than the continuous process itself."]},
  {freq:2, q:"The values of human being can be enumerated as", opts:["Nine", "Thirty", "Eighteen", "Twenty four"], a:3, explanations:["The UHV curriculum explicitly enumerates nine universal feelings or values that are foundational in human relationships (Trust, Respect, Affection, Care, Guidance, Reverence, Glory, Gratitude, Love). While significant, these are specific to relationship dynamics and not the entire scope of human values.", "The number thirty is not identified in the provided UHV context as the enumeration of human values. The framework typically categorizes values in various ways, but not as thirty comprehensive values.", "The number eighteen is not identified in the provided UHV context as the enumeration of human values. UHV focuses on a core set of principles and feelings that govern human conduct and relationships.", "While the provided context explicitly details nine 'feelings (values) in relationship', Universal Human Values envisions a comprehensive set of values encompassing all aspects of human living, including conduct, thought, and interaction at individual, family, societal, and natural levels. This broader understanding of values for holistic human living could lead to a more extensive enumeration, such as twenty-four, representing a complete set for achieving harmony at all levels of existence, though the specific enumeration of these twenty-four values is not detailed in the immediate context provided."]},
  {freq:2, q:"Which is NOT a characteristic of professionalism?", opts:["Kindness", "Competency", "Morality", "Complacency"], a:3, explanations:["Kindness is identified as a natural characteristic of human beings with human consciousness and is associated with compassionate behavior, which is a key aspect of ethical human conduct and professionalism in UHV.", "Competence in professional ethics is explicitly defined in UHV as the ability to effectively utilize power and augment the universal human order, making it a fundamental characteristic of professionalism.", "Morality is inherently covered by the concept of 'Ethical Human Conduct' which is characterized by Values, Policy, and Character. Living with universal human values forms the basis for moral and ethical behavior in a professional context.", "Complacency, defined as being self-satisfied without being aware of potential dangers or deficiencies, is not a characteristic of professionalism. Professionalism, in UHV, demands continuous self-evaluation, responsible engagement, and a commitment to improvement, which contradicts complacency."]},
  {freq:2, q:"Six characteristics of professional style — which one is NOT?", opts:["Ethical", "Emotional", "Responsible", "Intellectual"], a:1, explanations:["Ethical conduct is a cornerstone of professionalism in UHV, explicitly mentioned as a requirement for a good professional and defined by values, policies, and character.", "While human beings have emotions and feelings are central to UHV, 'emotional' as a characteristic of *professional style* is not emphasized. Professionalism, instead, advocates for conduct guided by right understanding and stable feelings of relationship, rather than being swayed by transient emotions.", "Professional competence in UHV includes understanding one's societal responsibility and ensuring mutually fulfilling behavior and enriching interaction with nature, which directly aligns with being responsible.", "Professionalism, guided by right understanding, requires intellectual engagement to achieve clarity about the comprehensive human goal, develop holistic vision, and build competence."]},
  {freq:2, q:"Continuity of prosperity can be ensured only if our production system is in harmony with the", opts:["Individual", "Society", "World", "Nature"], a:3, explanations:["While individual right understanding and happiness are crucial components of the comprehensive human goal, the continuity of prosperity, which involves the sustainable availability of physical facilities, is primarily ensured by the production system's harmony with nature.", "Harmony in society is vital for fearlessness and mutual fulfillment in human-human relationships. However, the question specifically asks about the production system's harmony for ensuring the continuity of physical resources for prosperity, which points directly to nature.", "The 'world' is a broader concept encompassing all levels of existence. However, the direct interaction for *production* of physical facilities and the prevention of resource depletion and pollution are primarily with nature, making it the most accurate answer.", "For the continuity of prosperity, production systems must be eco-friendly, cyclic, and mutually enriching, meaning they must operate in harmony with nature to prevent resource depletion and pollution, as stated in the context about holistic technologies."]},
  {freq:2, q:"Significance of relationship building in value education:", opts:["Relationships are a distraction", "Solely based on material benefits", "Healthy relationships promote emotional well-being and empathy", "None"], a:2, explanations:["In UHV, relationships are considered a fundamental requirement for human fulfillment, second only to right understanding. To view them as a distraction contradicts the core principles of the course.", "UHV explicitly differentiates between physical facilities (material benefits) and relationships. While physical facilities are necessary, relationships are primarily about feelings like trust, respect, and mutual happiness, which are not solely based on material gains.", "Value education aims for mutual fulfillment in relationships, which naturally fosters feelings of trust, respect, and affection among people. This leads to emotional well-being and cultivates empathy, helping to resolve conflicts and build a harmonious society.", "Option 2 accurately describes a key significance of relationship building in value education, highlighting its role in promoting emotional well-being and empathy."]},
  {freq:2, q:"Besides physical facilities, human beings want", opts:["Name", "Fame", "Relationship", "None"], a:2, explanations:["While social recognition might be a desire, 'name' is not considered a fundamental and continuous human aspiration in UHV. The core aspirations are continuous happiness and prosperity, achieved through right understanding, relationship, and physical facility.", "Similar to 'name,' 'fame' is an external and temporary desire for social recognition. UHV emphasizes internal happiness and fulfillment derived from harmonious relationships and right understanding, rather than external accolades.", "UHV clearly states that for human beings, physical facility is necessary but not adequate. Fulfillment in 'Relationship' with other human beings is identified as a distinct and continuous basic requirement, alongside right understanding, for mutual happiness.", "Since 'Relationship' is identified as a fundamental need for human beings in addition to physical facilities, this option is incorrect."]},
  {freq:2, q:"Which response is common to both Self and Body?", opts:["Knowing", "Accepting", "Recognizing", "Assuming"], a:2, explanations:["Knowing is an activity unique to the Self (consciousness), where reality is understood as it is. The Body, being a material entity, does not possess the capacity for 'knowing' in this sense.", "While 'natural acceptance' is a key concept related to the Self's innate response to proposals, 'accepting' as a direct 'response' activity common to both Self and Body is not explicitly listed in the UHV framework in the same way 'recognizing' is.", "The UHV framework explicitly states that both the Self and the Body engage in 'recognizing' and 'fulfilling'. The Body recognizes physio-chemical interactions, and the Self recognizes relationships based on its assumptions.", "Assuming is an activity of the Self, where it accepts something about reality, which may or may not be complete. The Body, as a material entity, does not 'assume'; its recognition and fulfillment are definite based on physical laws."]},
  {freq:2, q:"What term describes desire+thought+expectation collectively?", opts:["Imagination", "Intuition", "Reality", "Instinct"], a:0},
  {freq:2, q:"Relationship between Body and Self:", opts:["Body dominates self", "Self dominates body", "Body is an instrument of the self", "Separate entities"], a:2, explanations:["In UHV, the Self is the conscious entity that is the seer, doer, and enjoyer, and the Body is its instrument. The idea of the Body dominating the Self is contrary to the harmonious relationship envisioned in UHV.", "While the Self provides instructions and decisions for the Body to execute, the UHV description focuses on a harmonious relationship where the Body serves as an 'instrument' rather than being 'dominated' in a forceful sense.", "UHV explicitly defines the Body as an 'instrument of the Self'. The Self is the seer, doer, and enjoyer, using the Body to interact with the world and express its decisions and feelings.", "Although the Self and Body are distinct entities with different needs and activities, they are understood as a 'co-existence' within a human being. They are not merely separate but are intricately linked, with the Body serving the Self."]},
  {freq:2, q:"What ensures harmony between Self and Body?", opts:["Competition", "Self-regulation and health", "Ignoring bodily needs", "Constant desire fulfillment"], a:1, explanations:["Competition implies opposition or struggle, which is antithetical to the concept of harmony between the Self and the Body. Harmony is achieved through a cooperative and responsible relationship.", "UHV defines 'Self-regulation' (Sanyam) as the feeling of responsibility in the Self towards the Body for its nurturing, protection, and right utilization. 'Health' (Swasthya) is the natural outcome when the Body responds to the Self's instructions and all its parts are in harmony, thereby ensuring harmony between them.", "Ignoring bodily needs leads to physical suffering and disharmony, which in turn affects the Self's state of happiness. Harmony requires conscious attention to and fulfillment of the Body's needs as guided by the Self.", "Constant desire fulfillment, especially if desires are driven by external sensations or preconditioning rather than right understanding, can lead to over-consumption, exploitation of the body, and internal contradictions, thereby disrupting harmony rather than ensuring it."]},

  {freq:1, q:"Physical order includes units like", opts:["Plants", "Animals", "Soil", "Humans"], a:2},
  {freq:1, q:"Which order in nature includes grass, plants, trees?", opts:["Physical", "Bio", "Animal", "Human"], a:1},

  {freq:1, q:"Soil-to-plants-to-soil conversion is an example of", opts:["Linear process", "Cyclic process", "Random process", "Unidirectional process"], a:1},
  {freq:1, q:"Which is a unit of animal order?", opts:["Soil", "Trees", "Birds", "Water"], a:2},
  {freq:1, q:"What enriches soil by acting as very good manure?", opts:["Dead leaves", "Water", "Air", "Animal dung"], a:3},
  {freq:1, q:"Activity of respiration is specific to which order?", opts:["Physical", "Bio", "Animal", "Human"], a:1},
  {freq:1, q:"Units of bio order participate in", opts:["Water cycle", "Oxygen cycle", "Nitrogen cycle", "All of these"], a:3},

  {freq:1, q:"Basic characteristic of ethical human conduct:", opts:["Variability", "Certainty", "Inconsistency", "Ambiguity"], a:1},
  {freq:1, q:"What ensures harmony at all levels of human participation?", opts:["Universal Human Values", "Wealth", "Power", "Fame"], a:0},
  {freq:1, q:"Which is NOT a human value?", opts:["Trust", "Respect", "Greed", "Love"], a:2},
  {freq:1, q:"What leads to harmonious coexistence?", opts:["Right understanding", "Power", "Wealth", "Fame"], a:0},
  {freq:1, q:"Typical case study for holistic production systems:", opts:["Modern Technologies", "Ancient Technologies", "Sustainable farming", "Industrial farming"], a:2},

  {freq:1, q:"Continuous happiness and prosperity can be achieved by", opts:["Wealth accumulation", "Physical health only", "Right understanding, relationship and physical facility", "Technological advancement"], a:2},
  {freq:1, q:"Content of value education primarily focuses on", opts:["Economic growth", "Physical well-being", "Materialistic achievements", "Right understanding and relationships"], a:3},
  {freq:1, q:"Self-exploration leads to", opts:["Understanding human needs", "Acquiring wealth", "Pursuing individual desires", "Technological skills"], a:0},
  {freq:1, q:"What is true about happiness in value education?", opts:["Temporary satisfaction", "Continuous state of harmony", "Accumulation of wealth", "Absence of problems"], a:1},
  {freq:1, q:"Method to fulfill basic human aspirations:", opts:["Ignoring societal norms", "Self-exploration and understanding", "Only material gains", "None of these"], a:1},
  {freq:1, q:"The human being is the co-existence of", opts:["Mind and body", "Self and body", "Heart and mind", "Soul and body"], a:1},
  {freq:1, q:"Continuous happiness is achieved through", opts:["Accumulating wealth", "Achieving power", "Living in harmony", "Pursuing pleasure"], a:2},
  {freq:1, q:"Right understanding in the self leads to", opts:["Wealth", "Happiness", "Confusion", "Ignorance"], a:1},
  {freq:1, q:"Activities of the self are", opts:["Temporary", "Continuous", "Periods", "Sporadic"], a:1},

  {freq:1, q:"___ behavior arises when managers put personal/organizational goals above stakeholder rights", opts:["Complementary", "Situational", "Unethical", "Confusing"], a:2},
  {freq:1, q:"Accepted principles of right or wrong governing conduct of business people are called", opts:["Business", "Conduct", "Business ethics", "Principles"], a:2},
];

const FREQ_LABEL = f => f>=4 ? `High Priority (${f}/6 Papers)` : f===3 ? `Medium Priority (${f}/6 Papers)` : f===2 ? `Repeated (${f} Papers)` : `Asked Once`;

// Sort questions by priority (frequency)
QUESTIONS.sort((a,b)=>b.freq-a.freq);

const quizEl = document.getElementById('quiz');
const scoreEl = document.getElementById('score');
const answeredEl = document.getElementById('answered');
const filterEl = document.getElementById('filter');
const resetBtn = document.getElementById('resetBtn');
const progressBarEl = document.getElementById('progressBar');
const progressTextEl = document.getElementById('progressText');

let state = QUESTIONS.map(()=>({answered:false, correct:null, picked:null}));

function render(){
  quizEl.innerHTML='';
  const mode = filterEl.value;
  let renderedCount = 0;
  
  QUESTIONS.forEach((item,i)=>{
    if(mode==='hi' && item.freq<3) return;
    if(mode==='wrong' && !(state[i].answered && state[i].correct===false)) return;

    renderedCount++;
    const div = document.createElement('div');
    div.className = 'q' + (item.freq>=3 ? ' high':'');
    
    // Head with question number and priority
    const head = document.createElement('div');
    head.className='qhead';
    head.innerHTML = `<span class="qnum">Question ${i+1}</span><span class="freq ${item.freq>=3?'hi':''}">${FREQ_LABEL(item.freq)}</span>`;
    div.appendChild(head);
    
    // Question text
    const qt = document.createElement('div');
    qt.className='qtext';
    qt.textContent = item.q;
    div.appendChild(qt);
    
    // Options grid
    const opts = document.createElement('div');
    opts.className='opts';
    item.opts.forEach((opt,oi)=>{
      const b = document.createElement('button');
      b.className='opt';
      b.textContent = opt;
      
      if(state[i].answered){
        b.disabled = true;
        if(oi===item.a) b.classList.add('correct');
        if(state[i].picked===oi && oi!==item.a) b.classList.add('wrong');
      }
      
      b.onclick = ()=>{
        if(state[i].answered) return;
        state[i].answered = true;
        state[i].picked = oi;
        state[i].correct = (oi===item.a);
        updateScore();
        render(); // Rerender to show states and explanations
      };
      opts.appendChild(b);
    });
    div.appendChild(opts);
    
    // Explanations Box (shows only if answered)
    if(state[i].answered){
      const expCard = document.createElement('div');
      expCard.className = 'explanation-card';
      
      const header = document.createElement('div');
      header.className = 'explanation-header ' + (state[i].correct ? 'correct' : 'wrong');
      header.innerHTML = state[i].correct 
        ? `<span>✓ Correct Response</span>` 
        : `<span>✗ Incorrect Response (Correct is: Option ${String.fromCharCode(65 + item.a)})</span>`;
      expCard.appendChild(header);
      
      const body = document.createElement('div');
      body.className = 'explanation-body';
      
      // Check if we have pre-computed explanations
      if(item.explanations && item.explanations.length === item.opts.length){
        // 1. Explanation of the picked option
        const pickedSec = document.createElement('div');
        pickedSec.className = 'explanation-section';
        const isPickedCorrect = (state[i].picked === item.a);
        pickedSec.innerHTML = `
          <div class="explanation-title ${isPickedCorrect ? 'good' : 'bad'}">
            Your Choice: ${item.opts[state[i].picked]} (${isPickedCorrect ? 'Correct' : 'Incorrect'})
          </div>
          <div class="explanation-text">${item.explanations[state[i].picked]}</div>
        `;
        body.appendChild(pickedSec);
        
        // 2. If wrong, show the correct explanation as well
        if(!isPickedCorrect){
          const correctSec = document.createElement('div');
          correctSec.className = 'explanation-section';
          correctSec.innerHTML = `
            <div class="explanation-title good">
              Correct Choice: ${item.opts[item.a]}
            </div>
            <div class="explanation-text">${item.explanations[item.a]}</div>
          `;
          body.appendChild(correctSec);
        }
      } else {
        // Fallback explanation if JSON is not generated yet
        body.innerHTML = `
          <div class="explanation-section">
            <div class="explanation-text">
              ${state[i].correct 
                ? 'Great job! You selected the right answer.' 
                : `You selected "${item.opts[state[i].picked]}". The correct answer is "${item.opts[item.a]}". (Detailed notes explanations are being compiled...)`}
            </div>
          </div>
        `;
      }
      
      expCard.appendChild(body);
      div.appendChild(expCard);
    }
    
    quizEl.appendChild(div);
  });
  
  if(renderedCount===0){
    quizEl.innerHTML = '<p style="font-family:inherit;color:var(--text-muted);text-align:center;padding:40px;">No questions match this filter.</p>';
  }
}

function updateScore(){
  const answered = state.filter(s=>s.answered).length;
  const correct = state.filter(s=>s.correct===true).length;
  
  scoreEl.textContent = correct;
  answeredEl.textContent = answered;
  
  // Update progress bar
  const total = QUESTIONS.length;
  const percent = total > 0 ? Math.round((answered / total) * 100) : 0;
  progressBarEl.style.width = `${percent}%`;
  progressTextEl.textContent = `${percent}% Completed (${answered}/${total})`;
}

filterEl.onchange = render;
resetBtn.onclick = ()=>{
  if(confirm("Are you sure you want to reset all your progress?")){
    state = QUESTIONS.map(()=>({answered:false, correct:null, picked:null}));
    updateScore();
    render();
  }
};

render();
updateScore();
</script>
