  {freq:2, q:"Right understanding with physical facilities brings", opts:["Deprivation", "Mutual prosperity", "Mutual fulfillment", "None"], a:1, explanations:["Deprivation is the feeling of not having enough, which arises when right understanding is missing, leading to an inability to correctly identify the need for physical facilities despite accumulation. Therefore, right understanding, in conjunction with physical facilities, does not lead to deprivation.", "Mutual prosperity is the correct outcome. When right understanding is present, one can correctly identify the need for physical facilities and engage in mutually enriching production processes, leading to the feeling of having more than required for oneself and contributing to others' well-being.", "Mutual fulfillment is a broader term encompassing both mutual happiness (from relationships based on right understanding) and mutual prosperity (from physical facilities based on right understanding). While related, 'mutual prosperity' specifically addresses the outcome concerning physical facilities.", "This option is incorrect because 'Mutual prosperity' is a direct and well-defined outcome of having right understanding in conjunction with physical facilities, as explained in the UHV framework."]},
  {freq:2, q:"Third basic requirement for transformation from animal to human consciousness is", opts:["Mental discipline", "Sensory pleasure", "All of these", "None"], a:0, explanations:["While not explicitly listed as one of the three core 'basic requirements' (Right Understanding, Relationship, Physical Facility) in the context, mental discipline is implicitly essential. It refers to the internal effort required for self-exploration, consistent self-reflection, and critical thinking necessary to develop and sustain 'Right Understanding', which is the primary catalyst for transformation.", "Sensory pleasure is characteristic of animal consciousness, where happiness is sought from transient external sensations. Transformation to human consciousness involves moving beyond this limited pursuit to continuous happiness and prosperity based on deeper understanding and relationships, making sensory pleasure an incorrect option.", "This option is incorrect because sensory pleasure is not a requirement for transformation; rather, it is a characteristic of the animal consciousness that human beings aim to transcend.", "This option is incorrect because, by inference, mental discipline is a crucial internal component for achieving the right understanding necessary for transformation, as explained above."]},
  {freq:2, q:"Right understanding of relationship means", opts:["I am in harmony with everyone and everything", "I am in conflict with everyone", "Indifference", "None"], a:0, explanations:["Right understanding of relationship inherently means living in harmony with everyone and everything. It involves understanding co-existence and extending feelings of trust, respect, and affection to all human beings, as well as recognizing our interconnectedness with nature.", "Conflict with everyone is the antithesis of right understanding of relationship. A state of conflict indicates a lack of understanding regarding human-human relationships and the inherent harmony that is naturally acceptable.", "Indifference signifies a lack of feeling or engagement, which is contrary to the active and fulfilling participation required in harmonious relationships. Right understanding fosters a sense of responsibility and connection, not detachment or apathy.", "This option is incorrect because 'I am in harmony with everyone and everything' directly aligns with the UHV concept of right understanding, which promotes co-existence and mutual fulfillment at all levels of living."]},
  {freq:2, q:"Fourth basic requirement for transformation from animal to human consciousness is", opts:["Relationship", "Detachment", "Right understanding", "Sensory pleasure"], a:0, explanations:["Relationship is one of the three fundamental requirements for human fulfillment and transformation from animal to human consciousness. It ensures mutual happiness through right feelings and understanding in our interactions with other human beings.", "Detachment is contrary to the UHV principles of living in harmony and co-existence. The transformation to human consciousness involves active, responsible, and fulfilling engagement in relationships, not withdrawal or indifference.", "Right understanding is indeed a basic requirement and the *primary* catalyst for transformation. However, in the context of the 'three basic requirements' (Right Understanding, Relationship, Physical Facility), the question asks for the 'fourth', which is ambiguous, but Right Understanding is usually considered the first in priority, not the fourth.", "Sensory pleasure is a pursuit associated with animal consciousness, where happiness is derived from external sensations. It does not contribute to the transformation to human consciousness, which is based on internal harmony and understanding."]},
  {freq:2, q:"When in harmony with everything and everyone, we can be in", opts:["Conflict", "Imbalance", "Detachment", "Peace"], a:3, explanations:["Conflict is the antithesis of harmony. When living in harmony, there is an absence of internal or external contradictions and opposition, making conflict an incorrect state.", "Harmony implies a state of balance and mutual fulfillment at all levels of existence. Imbalance, therefore, represents a deviation from this desired state of order and relationship.", "Detachment suggests a lack of connection or involvement. In UHV, harmony, especially expressed through feelings like love (the feeling of being related to all), signifies being deeply interconnected, so detachment is contrary to this.", "Peace is the natural outcome of living in harmony with everything and everyone. It is characterized by mutual fulfillment, trust, and co-existence, free from conflict and internal contradictions, as ethical conduct (aligned with harmony) 'does not give rise to conflict within'."]},
  {freq:2, q:"Human goal at the level of nature is", opts:["Prosperity", "Co-existence", "Fearlessness", "Right understanding"], a:1, explanations:["Prosperity is the comprehensive human goal identified at the level of the family. It refers to the feeling of having more physical facility than required.", "Co-existence (mutual fulfilment) is explicitly stated as the human goal at the level of nature/existence. This entails living in a mutually fulfilling and respectful relationship with all natural orders.", "Fearlessness, which is based on trust and affection, is the comprehensive human goal at the level of society, ensuring a society free from fear.", "Right understanding is the human goal at the level of the individual Self, leading to continuous happiness and guiding all other goals."]},
  {freq:2, q:"\"Knowing\" means having", opts:["Self exploration", "Right understanding", "Evaluation", "None of these"], a:1, explanations:["Self-exploration is a process or mechanism to achieve 'knowing' or right understanding, involving natural acceptance and experiential validation, but it is not 'knowing' itself.", "As per the UHV texts, \"Knowing\" means having the right understanding. This refers to the realization of the inherent harmony and co-existence in existence, leading to clarity and definite human conduct.", "Evaluation is an activity of the Self, where one assesses desires, thoughts, and expectations. While essential, it is a part of the mental process, not the ultimate state of 'knowing' or right understanding.", "Since 'Right understanding' is explicitly identified as the meaning of 'knowing' in the provided context, this option is incorrect."]},
  {freq:2, q:"What is true about a professional?", opts:["Has to have autonomy", "Cannot be supervised by client", "Should not be subject to political control", "All of these"], a:3, explanations:["A professional, particularly one operating with ethical human conduct and right understanding, requires autonomy to make decisions aligned with universal human values and the greater good, rather than being solely dictated by external pressures.", "A professional's role involves applying specialized knowledge and ethical judgment. This implies that while clients articulate needs, the professional guides the solution based on expertise and ethical considerations, hence not being directly supervised by the client in terms of professional judgment.", "For a professional to uphold ethical conduct and contribute to the universal human order, their work should be free from undue political influence that could compromise their integrity or commitment to human welfare.", "In the context of UHV, a 'good professional' is envisioned as one who operates with ethical human conduct and right understanding. These qualities necessitate independence of judgment (autonomy), expert guidance over client directives, and freedom from political influence, making all these statements true for an ideal professional."]},
  {freq:2, q:"Basic rule of professionalism: \"not knowingly to do ___\"", opts:["Harm", "Work", "Competition", "Copying"], a:0, explanations:["This option is correct. The provided context explicitly states, \"The basic rule of professionalism is 'not knowingly to do Harm'\". This emphasizes that a fundamental ethical responsibility in any profession is to consciously avoid causing detriment or injury to others or the larger system.", "This option is incorrect. While work is a core component of professionalism, the basic rule refers to the ethical constraint on actions rather than the act of working itself. Professionals are expected to perform work, but the ethical principle is about the nature and impact of that work.", "This option is incorrect. Competition may be a feature of professional environments, but it is not the foundational ethical rule. The UHV perspective guides professionals toward mutually fulfilling outcomes, which goes beyond mere competition and prioritizes avoiding harm.", "This option is incorrect. Copying or plagiarism is an unethical practice, especially in creative and academic professions, and it can indeed cause harm. However, \"Harm\" is a broader and more fundamental principle that encompasses various unethical acts, including intellectual property infringement, and is directly stated as the basic rule in the context."]},
  {freq:2, q:"Study of ___, contrasted with legal obligations, is called ethics", opts:["Behaviors", "Moral", "Business", "All of these"], a:1, explanations:["This option is incorrect. Ethics certainly involves the study of behaviors, but it focuses on evaluating the rightness or wrongness of those behaviors, rather than merely observing them. The core of ethics lies in moral judgment and principles.", "This option is correct. The context defines ethics as a conception of \"Right and Wrong\" or \"Good and Moral\" conduct, distinguishing it from legal or contractual obligations. Ethics primarily deals with the moral principles that guide human actions.", "This option is incorrect. Business ethics is a specific application of ethical principles within the business domain, but ethics itself is a broader field of study. It encompasses moral conduct in all aspects of life, not just business.", "This option is incorrect. While ethics relates to behaviors and has applications in business, the fundamental subject of ethics, when contrasted with legal obligations, is the discerning of what is morally right or wrong. \"Moral\" best encapsulates this core aspect."]},
  {freq:2, q:"Ethics is a conception of ___ conduct", opts:["Bad/Wrong", "Good/Correct", "Right/True", "Right and Wrong"], a:3, explanations:["This option is incorrect because while ethics helps identify bad and wrong conduct, it is not solely a conception of these. Ethics provides a comprehensive framework that also includes what is good and right.", "This option is incorrect because while ethics certainly involves good and correct conduct, the context specifically defines ethics as encompassing both the positive and negative aspects. Focusing only on 'Good/Correct' would be an incomplete understanding.", "This option is incorrect. Ethics is concerned with 'Right' conduct, but the term 'True' is generally associated with factual accuracy rather than moral evaluation of actions. The contrast is typically between right and wrong.", "This option is correct. The provided context directly states, \"Ethics is a conception of Right and Wrong as contrasted with what is legally or contractually obligated.\" This highlights that ethics involves discerning between acceptable and unacceptable human actions based on inherent values."]},
  {freq:2, q:"Ethics and ___ go together", opts:["Profits", "Management", "Workership", "All of these"], a:3, explanations:["Ethics is closely tied to profits, as professional ethics involves resolving issues arising from profit maximization through right understanding. The UHV approach encourages profit generation that is mutually enriching and contributes to the universal human order.", "Ethics is essential in management, as it guides the development of appropriate management patterns that are people-friendly and eco-friendly. Competence in professional ethics includes the ability to identify and develop ethical management models.", "Ethics is fundamental to 'workership' or professional conduct, as it ensures that individuals utilize their professional competence to augment the universal human order. Ethical conduct is a prerequisite for being a good professional in any field.", "This option is correct. The UHV curriculum integrates ethics across various professional dimensions, including how profits are pursued, the principles guiding management decisions, and the overall conduct expected from individuals in their work roles. Therefore, ethics goes together with all these aspects."]},
  {freq:2, q:"___ driven companies are always successful in the long run", opts:["Management", "Worker union", "Value", "Profit"], a:2, explanations:["Management focuses on the 'how to do' aspect of an organization, which involves skills and execution. While important, without a foundation of values ('what to do'), management alone can lead to a focus on mere efficiency or profit maximization, which is not sustainable for long-term success according to UHV.", "Worker unions primarily advocate for employee rights and welfare. While this contributes to a positive work environment and is a component of a value-driven organization, it is not the overarching driver that ensures a company's success in the long run from a holistic UHV perspective.", "Value-driven companies, guided by a clear understanding of what is truly valuable (e.g., mutual fulfillment, harmony, ethical conduct), are aligned with human aspirations. The UHV perspective emphasizes that the priority is 'values, then skills,' and that a value domain understanding is essential for a fulfilling and successful life, leading to long-term success and resolution of dilemmas.", "The UHV framework explicitly states that the 'prevailing worldview focusing on profit maximization' is a primary cause of 'unethical practices, contradictions and dilemmas.' Therefore, a company driven solely by profit is unlikely to be successful in the long run as it tends to neglect ethical conduct and comprehensive human goals."]},
  {freq:2, q:"A business needs to be ethical in order to", opts:["Fulfill public expectations", "Prevent harming others", "Improve relations/productivity", "All of these"], a:3, explanations:["Ethical conduct is described as 'people-friendly,' meaning it aligns with societal well-being and fulfills the expectations of stakeholders and the public for responsible behavior. A profession is viewed as a service that participates in the larger order in a mutually fulfilling manner, inherently meeting public expectations.", "Ethical conduct 'does not give rise to conflict within' and is 'people-friendly, eco-friendly,' directly implying that it prevents harm to individuals, society, and nature. This is a fundamental aspect of operating responsibly and sustainably.", "Competence in professional ethics is correlated with 'sustainable personal as well as collective happiness and prosperity,' and involves 'mutually fulfilling behaviour.' This directly leads to improved relationships among employees, with customers, and with the larger society, which enhances overall productivity and harmony.", "Ethical conduct, being self-satisfying, people-friendly, and eco-friendly, naturally encompasses fulfilling public expectations, preventing harm to others, and fostering better relations and productivity. All these aspects are interconnected and crucial for a business to operate ethically and sustainably according to UHV."]},
  {freq:2, q:"Types of ethics issues include", opts:["Functional area ethics", "Corporate policy ethics", "Face to face ethics", "All of these"], a:3, explanations:["Functional area ethics refers to ethical dilemmas and practices specific to different departments or functions within an organization, such as marketing, finance, or human resources. These fall under the practical application of 'policies' and 'character' in specific professional contexts.", "Corporate policy ethics involves the ethical principles and guidelines embedded within an organization's official rules and procedures. This directly relates to the 'Policy (Neeti)' aspect of ethical human conduct, which guides how individuals and the organization interact with themselves, the body, and physical facilities.", "Face-to-face ethics pertains to the ethical considerations and conduct in direct interactions between individuals, such as between colleagues, managers and subordinates, or with customers. This reflects the 'Values (Mulya)' and 'Character (Charitra)' components, which guide harmonious relationships and behavior in society.", "Ethical issues manifest across all dimensions of professional life, encompassing individual interactions (face-to-face ethics), organizational guidelines (corporate policy ethics), and the specific operations of various departments (functional area ethics). The UHV framework of Mulya-Neeti-Charitra aims to address ethics comprehensively across these different scales."]},
  {freq:2, q:"What is called living with assumption of self only as body, and on basis of physical facilities, not right understanding/relationship?", opts:["Human consciousness", "Happiness", "Right Understanding", "Animal Consciousness"], a:3, explanations:["Human consciousness is defined as living with 'right understanding, relationship, and physical facility, in correct priority.' The description in the question, which involves ignoring right understanding and relationship, is contrary to the definition of human consciousness.", "Happiness is a state of harmony. Living solely for physical facilities and assuming oneself as only the body leads to a feeling of deprivation and exploitation, resulting in disharmony, which is the opposite of happiness.", "Right understanding is the foundational requirement for continuous happiness and prosperity, guiding human consciousness. The state described in the question is characterized by the *absence* of right understanding and focus solely on physical facilities.", "Animal consciousness is explicitly defined in UHV as 'living for physical facility alone, ignoring right understanding/relationship' or 'working only for physical facility, or living with assumption of oneself as body.' This perfectly matches the scenario described in the question."]},
  {freq:2, q:"Participation of human beings is seen in two forms:", opts:["Prosperity and work", "Values and Understanding", "Behavior and Wealth", "Behavior and Work"], a:3, explanations:["Prosperity is an outcome of right living and work, specifically the feeling of having more than required physical facilities, rather than a form of human participation itself. While work is a form of participation, prosperity is a result.", "Values are guiding principles and understanding is the basis for ethical conduct, but they are not the two direct forms of human participation. Ethical human conduct is a representation of values, policies, and character.", "Wealth refers to physical facilities or resources, which are objects of work, not a form of human participation. Behavior is a form of participation, but wealth itself is not.", "According to UHV, human participation manifests as 'behavior with other human beings' and 'work with the rest of nature'. These two forms lead to mutual happiness and mutual prosperity, respectively, when guided by right understanding."]},
  {freq:2, q:"What are the outcomes of realization and understanding?", opts:["Work", "Values", "Happiness", "Health"], a:1, explanations:["Work is a form of participation in nature, guided by understanding, but 'values' are the direct principles that emerge from realization and understanding, forming the basis for ethical conduct. Work is an application, not a fundamental outcome of understanding.", "Realization and right understanding enable one to identify and live by universal human values, which form the basis of ethical human conduct. Values are directly born out of correctly understanding the self and existence, guiding our relationships and actions.", "Happiness is a state of harmony and a basic human aspiration that is achieved through right understanding and living with values, rather than being the direct 'outcome' of understanding itself. Understanding *leads* to happiness.", "Health relates to the well-being of the body and is managed through self-regulation, which is a part of ethical human conduct guided by understanding. However, 'values' are the broader principles that arise from understanding, encompassing various aspects including health."]},
  {freq:2, q:"Observable symbols/signs of an organization's culture are called", opts:["Cultural design", "Artifacts", "Cultural formatting", "Cultural decor"], a:1, explanations:["The provided Universal Human Values context does not contain specific information about 'cultural design' within the framework of organizational culture. Therefore, this option is not supported by the given materials.", "The provided UHV context does not directly address organizational culture or this specific definition of 'artifacts'. However, in general organizational studies, 'artifacts' refer to the visible, tangible, and audible manifestations of a culture, such as symbols, stories, and practices.", "The provided Universal Human Values context does not contain specific information about 'cultural formatting' in relation to observable signs of an organization's culture. This term is not defined or discussed within the given UHV materials.", "The provided Universal Human Values context does not contain specific information about 'cultural decor' as a term for observable symbols of an organization's culture. This term is not a standard UHV concept within the provided texts."]},
  {freq:2, q:"Ability to perform a specific task/action/function successfully is called", opts:["Competence", "Purpose", "Intention", "Program"], a:0, explanations:["Competence is defined in the UHV context as the ability to do or perform tasks successfully, including the ability to fulfill aspirations. It signifies the capability or skill to execute an action effectively.", "Purpose refers to the aim or goal for which an action is undertaken. While competence is essential for fulfilling a purpose, purpose itself is the 'why' rather than the 'how' or ability to perform.", "Intention is the underlying desire or resolve to achieve a goal. In UHV, intention is seen as universal (e.g., wanting happiness), while competence (the ability to fulfill that intention) may vary among individuals.", "A program refers to the plan or course of action designed to achieve a goal. Competence is the ability to effectively execute this program, not the program itself."]},
  {freq:2, q:"To live in harmony with other human beings is", opts:["Svatva", "Swatantrata", "Swarajya", "None"], a:1, explanations:["The provided context does not define 'Svatva', and it is not identified as the state of living in harmony with other human beings. Therefore, this option is incorrect.", "While not explicitly defined in the provided snippets, 'Swatantrata' is not indicated in the context as the state of living in harmony with other human beings for this specific question.", "Based on the provided context (Reference 1), 'Swarajya' is explicitly identified as the state of living in harmony with other human beings. It represents a collective, orderly, and harmonious existence in society.", "This option is incorrect because 'Swarajya' is explicitly identified in the provided context as the state of living in harmony with other human beings."]},
  {freq:2, q:"Natural acceptance is", opts:["Universal", "Definite", "Continuous", "All of these"], a:3, explanations:["Natural acceptance is universal because it 'does not change with time, place or person' (Reference 4). It is inherent in all human beings, making it universally applicable.", "Natural acceptance is definite, meaning when a question related to fundamental human purpose or basic desires is asked, 'we get a definite answer from our natural acceptance' (Reference 5).", "Natural acceptance is continuous, as implied by the 'continuity of happiness and prosperity' being a basic human aspiration which is derived from natural acceptance (Reference 3, 4). It does not fluctuate or change.", "All three options—Universal, Definite, and Continuous—are characteristics of natural acceptance. Natural acceptance is inherent in all human beings (universal), provides clear answers to fundamental questions (definite), and remains constant (continuous) (Reference 4, 5)."]},
  {freq:2, q:"It is important to have a good ___ to be successful in your career", opts:["Appearance", "Attendance", "Attitude", "Respectfulness"], a:2, explanations:["The provided context does not mention 'appearance' as a key factor for success in one's career; the focus is instead on ethical conduct, values, and competence.", "While attendance is generally a basic requirement in any profession, the context does not highlight it as a primary element for achieving career success compared to the role of 'attitude' in competence.", "According to the context, 'attitude' is a crucial component in the contemporary evaluation of competence, alongside skill (Reference 4, Slide 47). A good attitude contributes significantly to professional success and effective teamwork, especially when 'blending professional skills with ethical human conduct' (Reference 1, Page 3).", "Respectfulness is a vital aspect of ethical human conduct and relationships. However, 'attitude' is a broader term that encompasses respectfulness and other positive dispositions necessary for overall professional competence and success."]},
  {freq:2, q:"___ skills (writing, speaking, body language) are important so messages to others are clear", opts:["Communication", "Cooperation", "Honesty", "Integrity"], a:0, explanations:["The description 'writing, speaking, body language' directly refers to the various modes of communication. These skills are essential for conveying clear messages and fostering understanding in relationships, which is a core aspect of human values.", "Cooperation refers to working together towards a common goal. While important in interactions, it describes a mode of behavior rather than the specific skills of transmitting messages (writing, speaking, body language).", "Honesty is a value pertaining to truthfulness in one's intentions and actions. While crucial for trustworthy communication, it is a characteristic of content and conduct, not the specific skills of message delivery.", "Integrity is a moral quality of being honest and having strong moral principles, implying consistency between thought, word, and deed. It is a foundational value but does not directly describe the skills of message transmission (writing, speaking, body language)."]},
  {freq:2, q:"High level of ___ means standing by your values even under pressure", opts:["Communication", "Cooperation", "Honesty", "Integrity"], a:3, explanations:["Communication is the process of exchanging information and understanding. While vital for coordination, it does not directly define the act of upholding personal values or principles under duress.", "Cooperation involves working jointly with others towards a common goal. It facilitates collective action but does not primarily describe an individual's steadfast adherence to values in challenging situations.", "Honesty refers to truthfulness in words and actions. While a crucial aspect of integrity, integrity is a broader concept encompassing consistency across all dimensions of one's being, including character and values, even when faced with pressure.", "Integrity, in Universal Human Values, means living in harmony with one's natural acceptance, ensuring consistency in thought, word, and deed. This commitment to one's values, even under pressure, forms the core of ethical human conduct, which is identified as arising from right understanding."]},
  {freq:2, q:"Without ___ you can get in trouble for lying/cheating/deceiving others", opts:["Communication", "Cooperation", "Honesty", "Integrity"], a:2, explanations:["Communication is the process of conveying information and understanding. Lack of communication might lead to misunderstandings, but not directly to accusations of lying, cheating, or deceiving.", "Cooperation involves working together towards a shared objective. Its absence may hinder collective progress, but it is not the direct quality that prevents lying, cheating, or deceiving.", "Honesty signifies truthfulness in one's intentions, words, and actions. Without honesty, one engages in behaviors like lying, cheating, or deceiving others, which are inconsistent with ethical human conduct and can lead to trouble and disharmony.", "Integrity is the broader quality of being honest and having strong moral principles, being consistent in one's values. While lying, cheating, and deceiving violate integrity, \"honesty\" is the more specific term for the absence of these particular acts."]},
  {freq:2, q:"Having ___ makes you a trusted person because you're committed to your company", opts:["Loyalty", "Organizational skills", "Productivity", "Respect"], a:0, explanations:["Loyalty denotes a strong feeling of support or allegiance, especially to one's organization or company. A person exhibiting loyalty is committed to the company's well-being and goals, naturally making them a trusted individual within that context, as their actions align with the company's interests.", "Organizational skills relate to the ability to manage tasks, time, and resources effectively. While beneficial for a company, they do not inherently convey trustworthiness based on commitment to the organization itself.", "Productivity measures the efficiency with which output is produced. High productivity is desirable, but it describes work output rather than the underlying commitment or allegiance that makes one a trusted person in an organization.", "Respect is the right evaluation of another individual, seeing them as similar in purpose, program, and potential (Reference 1, Page 36). While mutual respect is vital for healthy relationships and fosters trust, it does not specifically mean commitment or allegiance to a company in the way loyalty does."]},
  {freq:2, q:"Quality needed when jobs can be done much better/faster with others:", opts:["Responsibility", "Respect", "Teamwork", "Cooperation"], a:2, explanations:["Responsibility is the state of being accountable for something. While individual responsibility is crucial for group success, it is not the specific quality that enables tasks to be done better and faster with others through collective action.", "Respect is the right evaluation of individuals, acknowledging their purpose, program, and potential (Reference 1, Page 36). While fundamental for healthy interactions, respect itself does not directly describe the collaborative process that makes group tasks more efficient.", "Teamwork refers to the collaborative effort of a group to achieve a common goal or complete a task in the most effective and efficient way. When jobs can be done \"much better/faster with others,\" it points directly to the synergy and coordinated effort characteristic of effective teamwork.", "Cooperation is the process of working together towards a shared purpose. While cooperation is essential, teamwork specifically highlights the integrated and often structured collaboration that leads to enhanced performance and efficiency (\"better/faster\") in completing tasks with others."]},
  {freq:2, q:"Three major types of ethical issues include EXCEPT:", opts:["Communication issues", "Systematic issues", "Corporate issues", "Individual issues"], a:0, explanations:["Communication issues are generally not considered a primary *type* of ethical issue, but rather a dimension through which other ethical issues (like lack of transparency or misinformation) might manifest or be managed. The UHV context focuses on ethical conduct in various spheres but does not categorize 'communication issues' as a distinct type alongside systemic, corporate, or individual issues.", "Systematic issues refer to ethical problems embedded within the structures, policies, and culture of a larger system or society. UHV addresses the need for a 'Universal Human Order' and 'Holistic Technologies, Production Systems and Management Models,' indicating a concern for ethical conduct at the societal and systemic levels.", "Corporate issues pertain to ethical challenges faced by organizations, businesses, or professions. The UHV course extensively covers 'Professional Ethics' and the 'code of ethical conduct of the profession,' directly implying that ethical issues can arise at the corporate or organizational level.", "Individual issues relate to ethical dilemmas or misconduct arising from an individual's choices, character, or values. The UHV context explicitly states that 'Ethics in the life of an individual can be imbibed only through inculcation of values, policies and character,' highlighting the foundational role of individual ethical conduct."]},
  {freq:2, q:"Ethics are moral principles and values which", opts:["Guide a firm's behavior", "Govern the actions of an individual", "Provide employees with rules", "Are legally enforceable"], a:1, explanations:["While ethical principles derived from individual conduct certainly *guide* a firm's behavior, the fundamental definition of ethics in UHV is rooted in the 'definitiveness of human conduct' and its application in the life of an individual. A firm's ethics are a collective manifestation of individual ethics.", "According to UHV, ethics are directly linked to the 'definitiveness of human conduct' and are something 'in the life of an individual' that can be imbibed through self-exploration. They serve as guidelines for an individual's behavior, work, and participation in the larger order, making this the most encompassing and accurate description.", "Ethics, in the UHV perspective, go beyond merely providing employees with prescriptive 'rules.' The emphasis is on developing 'right understanding' and 'natural acceptance' which inform ethical conduct from within, rather than relying solely on external do's and don'ts or disciplinary measures.", "Ethics and laws are distinct; ethical principles often extend beyond what is legally enforceable. The context implies that ethics are a conception of 'good and moral' contrasted with what is 'legally or contractually obligated,' indicating they are not inherently tied to legal enforceability."]},
  {freq:2, q:"A ___ is a set of principles people/organizations hold themselves to", opts:["Code of ethics", "Code of honor", "Ethical perspective", "Persuasive tactic"], a:0, explanations:["The UHV context explicitly defines 'Professional Ethics' as the 'code of ethical conduct of the profession' or 'the code for ensuring right utilization of one’s professional skills.' This directly matches the concept of a code of ethics as a formal set of principles an organization or profession adheres to.", "While a code of honor is a set of principles, it often carries a more informal, personal, or group-specific connotation, distinct from the formal 'code of ethical conduct' referred to in professional contexts within UHV. The term 'code of ethics' is more precise for organizations.", "An ethical perspective refers to a particular viewpoint or way of looking at ethical issues, not a codified set of principles itself. It describes the lens through which ethics are viewed, rather than the guiding principles adopted by an entity.", "A persuasive tactic is a strategy used to influence others, which is unrelated to a formal set of principles that individuals or organizations commit to following for their conduct."]},
  {freq:2, q:"___ are beliefs/attitudes that can conflict with our ethical decisions", opts:["Morals", "Principles", "Virtues", "Values"], a:3, explanations:["Morals generally refer to an individual's principles concerning right and wrong, and they typically form the foundation of ethical decisions rather than conflicting with them. In UHV, morals are often seen as internal guides that, when aligned with universal human values, lead to ethical conduct.", "Principles are fundamental truths or propositions that serve as the foundation for belief or behavior. Ethical principles are usually consistent with ethical decisions; if an individual has sound principles, they are less likely to conflict with ethical conduct.", "Virtues are character traits or qualities considered morally good, such as honesty, integrity, or compassion. They are components of ethical conduct and contribute to ethical decision-making, rather than being a source of conflict with it.", "Values are underlying beliefs and attitudes that guide behavior. The UHV context notes that IPR can conflict with 'Values,' suggesting that when individual or societal values (which might stem from preconditioning) are not aligned with universal human values or right understanding, they can lead to ethical dilemmas or conflicts with ethical decisions."]},
  {freq:2, q:"IPR is an important aspect of international trade. Which is covered?", opts:["Patents", "Copyrights", "Trademarks", "All of these"], a:3, explanations:["Patents protect inventions, including products and processes, and are a key component of Intellectual Property Rights. The provided context explicitly lists patents as being covered under IPR.", "Copyrights protect original works of authorship, such as literary, dramatic, musical, and artistic works. The course materials directly state that copyrights are encompassed within the scope of IPR.", "Trademarks are signs, designs, or expressions that identify products or services from a particular source. The relevant context specifies that trademarks are included as part of IPR.", "The UHV course materials, when discussing IPR, explicitly state that Intellectual Property Rights encompass Patents, Copyrights, and Trademarks. Therefore, all these categories are covered under IPR."]},
  {freq:2, q:"Which is NOT infringement of copyright?", opts:["Copy software to another computer by educational institution", "Copy by company", "Copy to another computer", "To make backup copies"], a:3, explanations:["The provided UHV context on IPR does not detail specific exceptions for educational institutions regarding software copying. Generally, unauthorized copying of software, even by an institution, would be considered copyright infringement without a specific license or fair use provision.", "The context does not provide specific information on copyright infringement by companies. Unauthorized copying of copyrighted material by a company, without a proper license or legal exception, typically constitutes copyright infringement.", "The UHV materials provided do not elaborate on the legality of copying software to another computer. Copying copyrighted software to another computer without authorization or a valid license is generally a direct act of copyright infringement.", "The provided context does not explicitly state which actions are not considered copyright infringement. However, making personal backup copies of legally purchased software or data is a common exception recognized in many copyright laws, intended to protect the user's investment, and thus is typically not considered infringement."]},
  {freq:2, q:"Patent can be granted for", opts:["Process", "Ideas", "Both product and process", "Product"], a:2, explanations:["A patent can indeed be granted for a process, which refers to a method or series of steps to achieve a result. However, this option is not exhaustive as patents are not limited to processes alone.", "Patents are not granted for mere abstract ideas or theoretical concepts. To be patentable, an invention must be a specific product or process that demonstrates novelty, non-obviousness, and utility, not just an idea.", "The UHV course material explicitly states that a patent can be granted for 'Both product and process'. This means intellectual property protection can extend to both the tangible invention and the method of creating or using it.", "While patents can certainly be granted for products, which are tangible items or compositions of matter, this option is incomplete. The provided context clarifies that patents also cover the processes involved in creating or using such products."]},
  {freq:2, q:"Government may order non-advertisement of patent application for invention related to", opts:["Information technology", "Food", "Drug", "Defense technology"], a:3, explanations:["The provided UHV context mentions IPR but does not specifically state that the government can order non-advertisement of patent applications related to information technology. Such restrictions are typically reserved for matters of national security.", "The context indicates that the government may order compulsory licensing for patents related to food in certain cases, but it does not mention non-advertisement for such applications. Compulsory licensing is distinct from non-advertisement.", "Similar to food, the context states that compulsory licensing may be ordered for drug-related patents, but it does not specify non-advertisement for these patent applications. These are separate government interventions in patent rights.", "The provided UHV context states that the government may order *compulsory licensing* for patents related to defense technology. While national security often involves restrictions like non-advertisement for defense-related inventions to safeguard classified information, the provided text only explicitly mentions compulsory licensing, not non-advertisement of patent applications."]},
  {freq:2, q:"A design can also be registered under", opts:["Trademark Act", "Patent Act", "Geographical Indication Act", "Copyright Act"], a:0, explanations:["The provided context (Reference 1, Q14) indicates that a design is typically registered under the Patent Act, not the Trademark Act. The Trademark Act primarily protects brand names, logos, and symbols used to identify goods or services, rather than the aesthetic features or industrial design of a product.", "According to the provided context (Reference 1, Q14), a design can be registered under the Patent Act (marked as the correct answer in the source document). While patents typically cover inventions and processes, industrial designs, which protect the aesthetic features of a product, are often governed by patent law or dedicated design acts that are closely related to patent principles.", "The Geographical Indication Act protects products that have a specific geographical origin and possess qualities or a reputation due to that origin. This is distinct from an industrial design, which pertains to the visual appearance or aesthetic features of a product.", "The Copyright Act protects original literary, dramatic, musical, and artistic works. While designs can have artistic elements, they are generally protected under design law or patent law due to their industrial applicability, distinguishing them from traditional copyrights on artistic works that do not have industrial utility."]},
  {freq:2, q:"IPR complete specification gives", opts:["Description of claim only", "Description of royalty", "Full description of invention", "Description of application"], a:2, explanations:["A complete specification for Intellectual Property Rights (IPR), particularly patents, provides a full and detailed description of the invention, which includes claims but is not limited to them. Claims are a critical part, but the specification encompasses more than just claims.", "A complete specification provides a full description of the invention, not just the capital involved. While capital may be necessary for developing and protecting an invention, it is not what the IPR specification describes.", "As per Reference 1 (Q10), the complete specification for IPR gives a \"Full description of the invention.\" This means it comprehensively details how the invention works, its components, and its unique aspects.", "A complete specification includes the full description of the invention, which is more comprehensive than just the application details. The application initiates the process, but the specification provides the exhaustive technical details."]},
  {freq:2, q:"Copyright is a", opts:["Creation by effort, intellect and capital", "Creation by efforts only", "Creation by negligence", "Creation by mental status"], a:0, explanations:["Copyright is an Intellectual Property Right that protects original works of authorship. Its creation inherently involves mental effort, intellectual input (creativity and originality), and often capital investment for its development, production, and dissemination, making it a creation by effort, intellect, and capital.", "While copyright definitely involves effort, it also crucially requires intellect and creativity to produce an original work. Attributing it solely to 'efforts only' would overlook the intellectual and creative dimension central to copyright protection.", "Copyrighted works are products of deliberate creative and intellectual endeavors, not negligence. Negligence implies a lack of care or attention, which is contrary to the intentional act of creating an original work.", "Copyright protection is based on the originality and expression of a work, resulting from conscious effort and intellect, rather than an undefined 'mental status'. The quality of the work stems from the creator's mental faculties and intentional action."]},
  {freq:2, q:"Globalization has improved living structure of which group?", opts:["All the people", "Developing countries", "Developed countries", "None"], a:2, explanations:["While globalization has led to economic growth in some sectors globally, it has not universally improved the living structure for 'All the people'. Often, benefits are unevenly distributed, leading to increased disparities between different groups and regions.", "Globalization has shown mixed effects on developing countries. While some have experienced economic growth and poverty reduction due to increased trade and investment, others have faced challenges like increased inequality, exploitation of resources, and cultural erosion. Therefore, it has not uniformly improved their living structures.", "Developed countries have largely benefited from globalization, often experiencing increased prosperity due to expanded markets, access to cheaper labor and resources, and technological advancements. Reference 1 (Q16) notes that developed nations are typically examples of prosperity, which can be linked to their favorable position in the globalized economy.", "This option is incorrect because, while globalization has brought challenges, it has demonstrably improved the living structures for certain groups and nations, particularly the developed countries, as well as segments of populations in developing countries, despite the uneven distribution of benefits."]},
  {freq:2, q:"Which sector experienced the least profit due to globalization?", opts:["Industrial", "Service", "Agriculture", "Secondary"], a:2, explanations:["This is an incorrect option. The industrial sector, particularly in developed nations, often benefits from globalization through increased market access and efficiency gains, rather than experiencing the least profit.", "This is an incorrect option. The service sector generally sees significant growth and profit in a globalized economy, especially with the rise of technology and international trade in services, unlike the agriculture sector.", "This is the correct option. According to the UHV notes, globalization questions typically identify the agriculture sector as experiencing the least profit gain, with developed nations often being the primary beneficiaries overall.", "This is an incorrect option. The secondary sector, which encompasses manufacturing and industry, often leverages globalization for increased production and market reach. The context specifically highlights the agriculture sector for the least profit."]},
  {freq:1, q:"What types of families do we see in cities mostly? (repeat-check)", opts:["Nuclear Family", "Joint family", "Matrilineal family", "All of the above"], a:0, explanations:["This is the correct option. The UHV notes indicate that a societal problem is the \"Breaking up of joint families,\" which implies a shift towards nuclear families, a trend often more pronounced in urban areas due to lifestyle changes and practical considerations.", "This is an incorrect option. The context explicitly mentions the \"Breaking up of joint families\" as a prevalent problem, suggesting that they are becoming less common, especially in cities, rather than being the most common type.", "This is an incorrect option. Matrilineal families are not discussed in the provided UHV context regarding common family structures in cities or trends related to societal problems. The focus is on the decline of joint families.", "This is an incorrect option because the UHV context specifically points to the breaking up of joint families, indicating that not all listed family types are most common in cities. Nuclear families are implied as increasingly prevalent."]},
  {freq:1, q:"Self-exploration uses two mechanisms — Natural Acceptance and ii) ---?", opts:["Experiential validation", "Reason", "Logical Thinking", "Theoretical concept"], a:0, explanations:["This is the correct option. The UHV curriculum explicitly defines self-exploration as utilizing two mechanisms: Natural Acceptance and Experiential Validation. Experiential validation involves living according to a proposal and checking if it leads to mutual happiness and prosperity.", "This is an incorrect option. While reason is a part of human understanding, it is not one of the two distinct, defined mechanisms of self-exploration in the UHV framework. Self-exploration goes beyond mere intellectual reasoning.", "This is an incorrect option. Logical thinking is a cognitive process, but UHV specifies 'Experiential Validation' as the second mechanism of self-exploration, distinct from general logical thought. It emphasizes practical verification.", "This is an incorrect option. Self-exploration is a process of practical verification and living, not merely engaging with theoretical concepts. It involves directly checking proposals against one's natural acceptance and lived experience."]},
  {freq:1, q:"Are the contents of self-exploration:", opts:["Program", "Desire", "Both a and b", "None"], a:1, explanations:["While 'Program' is one of the two sub-parts of the content for self-exploration (how to fulfill basic aspirations), the given correct option for this question is 'Desire'. Both 'Desire' and 'Program' together form the content.", "This is the correct option. According to the UHV curriculum, the content for self-exploration has two sub-parts: 'Desire' (what our basic aspiration is) and 'Program' (the way to fulfill this aspiration). 'Desire' is therefore a direct content.", "This option implies that both 'Program' and 'Desire' are the contents. While both are indeed contents of self-exploration, if the question asks for a single answer and 'Desire' is specified as correct, then selecting 'Both a and b' might be considered incorrect in that specific context.", "This is an incorrect option. The UHV notes clearly state that 'Desire' is a primary sub-part of the content for self-exploration, making this option invalid."]},
  {freq:1, q:"Harmony should be maintained in", opts:["Between body and life", "Between self and society", "Between life and environment", "All of these"], a:3, explanations:["This option is correct. Universal Human Values emphasizes understanding harmony within the human being, which includes the co-existence and proper functioning of the Self and the Body. The course specifically covers 'Harmony of the Self with the Body'.", "This option is correct. UHV delves into the dynamics of relationships within the family and society, stressing the importance of trust, respect, and justice for maintaining harmony among human beings. This forms a core aspect of living with human consciousness.", "This option is correct. The UHV curriculum extends to understanding the interconnectedness and mutual fulfillment among the four orders of nature, advocating for harmonious interaction with the environment. Policies are identified as tools to maintain harmony with the orders of nature.", "This option is correct. The Universal Human Values course covers harmony at all these levels: within the human being (Self and Body), in the family and society (Self and other humans), and in nature/existence (Self and the rest of nature). Achieving harmony at all these levels is crucial for continuous happiness and prosperity."]},
  {freq:1, q:"There is an exchange of ___ between self and body.", opts:["Food", "Thought", "Air", "Information"], a:1, explanations:["Food is a physical facility that the Self provides for the Body's nurturing and protection. It represents a need of the Body, but it is not the *medium* of exchange or transaction between the conscious Self and the material Body.", "Thought is an activity of the Self (consciousness), involving analysis and comparison. While the Self communicates its thoughts and decisions to the Body, the transaction between the two entities is specifically described as information, not thought itself.", "Air, like food, is a physical requirement for the Body's survival and well-being. It is part of the nurturing process for the body, but it does not represent the direct transactional mechanism between the conscious Self and the physical Body.", "The UHV framework explicitly states that the transaction between the Self ('I') and the Body happens only as information. The Self gives instructions to the Body, and the Body provides sensations and information back to the Self, facilitating their co-existence and interaction."]},
  {freq:1, q:"What is the activity of the power \"Expectation\"?", opts:["Imaging", "Analysing", "Selecting/Testing", "Distributing"], a:2, explanations:["Imaging is the activity associated with 'Desire'. Desire is the process of creating an image or vision within the Self of what one wants.", "Analysing is the activity associated with 'Thought'. Thought involves evaluating and comparing various possibilities to fulfill one's desires.", "Expectation is defined as the power for the activity of selecting, often based on 'tasting' or experiencing different options. It involves choosing or anticipating a particular outcome from the analyzed possibilities.", "Distributing is not one of the three defined activities (desire, thought, expectation) of the Self that constitute imagination within the UHV framework. These activities are imaging, analysing, and selecting/tasting."]},
  {freq:1, q:"Living on the basis of preconditioning or sensation refers to", opts:["Enslaved", "Self organized", "Independent", "Svantrata"], a:0, explanations:["When one's imagination is primarily driven by unverified preconditionings (assumptions without knowing) or by seeking happiness through fleeting sensations, it leads to a state of being 'enslaved'. This means one's choices and happiness become dependent on external factors or unverified beliefs, leading to contradiction and unhappiness.", "Self-organization arises when one's imagination is in harmony with one's natural acceptance, leading to continuous happiness and fulfillment. Living based on preconditioning or sensation, without verification, is often contradictory and leads away from true self-organization.", "Living based on preconditioning or sensation implies a lack of true autonomy, as one's actions are dictated by external beliefs or transient bodily inputs rather than by right understanding. True independence stems from aligning with natural acceptance.", "Svantrata (self-organization) refers to a state where the Self is in harmony within itself and guides the Body and interactions with the world based on right understanding and natural acceptance. This is the opposite of being driven by unverified preconditionings or sensations, which leads to a deluded self."]},
  {freq:1, q:"What is the basis of self-organized vs preconditioned living — opposite of enslaved is", opts:["Self organized / Independent / Svantrata (all valid framings)", "-", "-", "-"], a:0, explanations:["This option is correct. According to UHV, when one's imagination is guided by natural acceptance and verified understanding, rather than unverified beliefs (preconditionings) or sensations, it leads to a state of self-organization, independence, or 'svantrata' (freedom). This state contrasts sharply with being 'enslaved' by external influences or unverified assumptions.", "This option is incomplete and does not provide a coherent concept or term related to self-organized living. In the context of UHV, a meaningful alternative to preconditioned or enslaved living requires a clearly defined state of being, which is addressed by concepts like self-organization and independence.", "This option is incomplete and does not present a valid concept from UHV that represents the opposite of enslaved living. The UHV framework emphasizes specific states like 'self-organization' or 'independence' as alternatives to living based on external impositions or unverified beliefs.", "This option is incomplete and lacks any specific content relevant to the question. To adequately answer, one must identify a term or concept that directly contrasts with being enslaved, such as living based on one's own verified understanding and natural acceptance."]},
  {freq:1, q:"Which characteristic does NOT relate to self?", opts:["Qualitative", "Continuous", "Temporary", "Quantitative"], a:2, explanations:["This characteristic relates to the Self. The needs of the Self, such as feelings of respect or trust, are qualitative in nature; they cannot be measured in quantities, unlike physical facilities for the Body.", "This characteristic relates to the Self. The needs and activities of the Self, like the desire for continuous happiness and right feelings (desire, thought, expectation), are continuous in time, not temporary.", "This characteristic does NOT relate to the Self. 'Temporary' describes the nature of the Body's needs and activities, which are required for a limited duration (e.g., food, walking), whereas the Self's needs and activities are continuous. This makes it the correct answer to what does NOT relate to the Self.", "This characteristic does NOT relate to the Self. 'Quantitative' describes the nature of the Body's needs, such as food or shelter, which are required in limited, measurable quantities. The Self's needs, being feelings and understanding, are qualitative."]},
  {freq:1, q:"What ensures continuity of need for self?", opts:["Respect, Trust = continuous needs", "-", "-", "-"], a:0, explanations:["This option is correct. Feelings like respect and trust are fundamental needs of the Self, and unlike physical facilities for the Body, these qualitative needs are continuous in time. The Self constantly desires these feelings for sustained happiness and fulfillment in relationships.", "This option is incomplete and does not provide a meaningful concept or set of needs that ensure the continuity of the Self's requirements. The UHV framework clearly identifies specific qualitative feelings as continuous needs of the Self.", "This option is incomplete and lacks relevant content. The continuity of the Self's needs is a core concept in UHV, emphasizing the persistent human aspiration for happiness and right feelings, exemplified by values like trust and respect.", "This option is incomplete and does not offer a valid explanation for the continuity of the Self's needs. The core needs of the Self are qualitative and non-temporary, forming the basis for continuous happiness and well-being."]},
  {freq:1, q:"The need of self is", opts:["Wealth", "Food", "Respect", "Shelter"], a:2, explanations:["This is an incorrect option. Wealth is a physical facility, and physical facilities are primarily needs of the Body for its nurturing, protection, and right utilization. While the Self may desire wealth, its fundamental need is for continuous happiness and right feelings, not the material item itself.", "This is an incorrect option. Food is a physical facility required for the nourishment and maintenance of the Body. It is a temporary and quantitative need of the Body, not a direct, qualitative need of the conscious Self.", "This option is correct. The need of the Self is for continuous happiness, which is fulfilled by right understanding and right feelings. Respect is a fundamental feeling in relationships that, when fulfilled, directly leads to happiness for the Self.", "This is an incorrect option. Shelter is a physical facility necessary for the protection of the Body. Like food and wealth, it is a temporary and quantitative need of the Body, rather than a direct, qualitative need of the Self."]},
  {freq:1, q:"Body's needs are fulfilled by", opts:["Emotional support", "Physical facility", "Moral values", "Spiritual practices"], a:1, explanations:["Emotional support refers to feelings like trust and respect, which are qualitative needs of the Self (consciousness), contributing to continuous happiness. These do not directly fulfill the material needs of the Body.", "Physical facility, such as food, clothes, and shelter, are material needs required for the nurturing, protection, and right utilization of the Body. The context explicitly states that the Body's needs are material and fulfilled by physio-chemical things.", "Moral values pertain to right understanding and right feeling within the Self, which are essential for continuous happiness. They address the qualitative needs of the Self rather than the quantitative, physical needs of the Body.", "Spiritual practices primarily aim at achieving right understanding and continuous happiness for the Self. They are related to the domain of consciousness and do not fulfill the distinct, material requirements of the Body."]},
  {freq:1, q:"Which is a quantitative need?", opts:["Respect", "Trust", "Food", "Friendship"], a:2, explanations:["Respect is a feeling, a qualitative need of the Self, which cannot be measured or quantified. The UHV perspective clearly distinguishes feelings like respect and trust as non-quantitative.", "Trust is also a qualitative need, a feeling that resides in the Self, and it forms a foundational value in relationships. It is not something that can be expressed or fulfilled in specific measurable quantities.", "Food is a physical facility, a need of the Body, which is quantitative in nature. One can identify the specific quantity of food required to nurture the body, distinguishing it from qualitative needs.", "Friendship involves feelings such as affection, care, and trust, all of which are qualitative needs of the Self. It is not a quantitative need that can be measured or counted in units."]},
  {freq:1, q:"Response of the body is based on", opts:["Knowing and assuming", "Recognizing and fulfilling", "Feeling and thinking", "Deciding and acting"], a:1, explanations:["Knowing and assuming are activities of the Self (I), the consciousness entity, which involves deeper understanding and acceptance. The Body, as a material entity, does not possess these higher-order cognitive functions.", "The context explicitly states that the response of the Body is based on recognizing and fulfilling. The Body is a material unit that simply recognizes physio-chemical processes and responds accordingly, in a definite manner.", "Feeling and thinking are continuous activities of the Self (consciousness), such as desire, thought, and expectation. The Body is an instrument through which the Self experiences or expresses, but these activities originate in the Self.", "Deciding is an activity of the Self (the Doer), and acting is the Body's execution of the Self's decisions. The fundamental response mechanism of the Body itself, however, is limited to recognizing and fulfilling stimuli definitively."]},
  {freq:1, q:"Which need is continuous for the self?", opts:["Food", "Shelter", "Respect", "Clothes"], a:2, explanations:["Food is a physical facility required for the Body, and its need is temporary, meaning it is needed for a limited duration and in specific quantities, not continuously.", "Shelter is a physical facility required for the Body's protection. Its need is temporary and quantitative, similar to food, rather than a continuous requirement of the Self.", "Respect is a feeling, a qualitative need of the Self, and all needs related to the Self, such as happiness and feelings like trust and respect, are continuous in time. The Self constantly desires these positive feelings.", "Clothes are physical facilities that fulfill a temporary and quantitative need for the Body, primarily for protection and comfort. While the Self might desire certain clothes for status, the basic need itself is bodily and temporary."]},
  {freq:1, q:"Process of fulfillment for the self includes", opts:["Physical work", "Accumulation of resources", "Right understanding", "None of these"], a:2, explanations:["Physical work is primarily related to the body and ensuring physical facilities, which is a part of fulfilling human needs, but not the direct process of fulfillment for the Self. Working only for physical facility is considered living with animal consciousness in UHV.", "Accumulation of resources pertains to physical facilities and wealth. While necessary for the body's sustenance, it is not the core process of fulfillment for the Self, which seeks continuous happiness and right understanding rather than mere accumulation.", "Right understanding is central to the fulfillment of the Self, leading to continuous happiness and prosperity. It is a fundamental goal for every individual and prepares one for a holistic alternative and the fulfillment of basic human aspirations.", "This option is incorrect because 'Right understanding' is explicitly identified as a key component of fulfillment for the self, leading to happiness and a harmonious existence, as per UHV principles."]},
  {freq:1, q:"Which is naturally acceptable in a relationship?", opts:["Disrespect", "Mistrust", "Jealousy", "Respect"], a:3, explanations:["Disrespect is the opposite of a naturally acceptable feeling in a relationship. UHV emphasizes that right evaluation is crucial for respect, and any form of wrong evaluation (over, under, or otherwise) leads to disrespect, which is not naturally acceptable.", "Mistrust is presented as the opposite of trust, which is a foundational and naturally acceptable feeling in human relationships. A relationship thrives on the assurance of good intention, not suspicion or mistrust.", "Jealousy is considered a deviation from naturally acceptable feelings like affection. When there is a lack of affection or a feeling of opposition, it manifests as jealousy, which is not conducive to mutual happiness in a relationship.", "Respect is a naturally acceptable feeling in a relationship, stemming from the right evaluation of the other person as similar in purpose, program, and potential. It is essential for mutual fulfillment and harmony within the family and society."]},
  {freq:1, q:"Which feeling is recognized as the complete value in relationship?", opts:["Care", "Glory", "Gratitude", "Love"], a:3, explanations:["Care is an important feeling involving responsibility for the nurturing and protection of the relative's body. While essential, it is a specific aspect of relationship fulfillment and not referred to as the 'complete value'.", "Glory is the acceptance for those who have made significant efforts for excellence. It is one of the nine definite feelings in a relationship but does not encompass the entirety of all relational values.", "Gratitude is the acceptance for those who have contributed to one's own excellence. It is a specific feeling of thankfulness and acknowledgment, but not the ultimate 'complete value' that relates to all human beings.", "Love is recognized as the complete value in a relationship, representing the feeling of being related to all human beings. It signifies the highest level of acceptance and comprehensive fulfillment in human-human connection."]},
  {freq:1, q:"Which feeling is considered the foundation of all relationship?", opts:["Care", "Trust", "Respect", "Affection"], a:1, explanations:["Care is the feeling of responsibility for nurturing and protecting the body of one's relative. While vital for a healthy relationship, it is not identified as the foundational value upon which all relationships are built.", "Trust is explicitly recognized as the foundation value in all relationships. It is the assurance that the other person intends to make one happy and prosperous, forming the basis for relating to others.", "Respect is defined as the right evaluation of the other person, recognizing their similarity and complementarity. It is crucial for a harmonious relationship but is built upon the foundational feeling of trust.", "Affection is the feeling of being related to the other, an acceptance of the other as one's relative. It is a significant feeling that relies on the presence of trust and respect to develop truly."]},
  {freq:1, q:"Trust is to be assured that the other intends to make me", opts:["Happy and prosperous", "Wealthy", "Powerful", "Famous"], a:0, explanations:["According to Universal Human Values, Trust is defined as the assurance that the other person genuinely intends to make you happy and prosperous. This intention is a foundational feeling in human relationships, implying a desire for mutual well-being.", "While prosperity involves having more than required physical facility, 'wealthy' specifically points to material accumulation. Trust in UHV encompasses the holistic goal of 'happiness and prosperity,' which includes physical well-being but goes beyond mere wealth to include feelings and right understanding.", "Trust in UHV is not about the other intending to make one powerful. The concept of power, especially over others, can lead to domination, which is contrary to the UHV principles of mutual respect and co-existence based on right feelings and understanding.", "Fame relates to external recognition and public adoration, which is not considered a fundamental human aspiration for continuous happiness and prosperity in UHV. Trust focuses on the intrinsic intent for well-being rather than external validation."]},
  {freq:1, q:"First step in understanding relationship?", opts:["Creating it", "Fulfilling it", "Recognizing it", "Neglecting it"], a:2, explanations:["In UHV, relationships are considered to be pre-existing; they are not created. The first step towards understanding a relationship is to recognize that this inherent connection already exists between one Self and another Self.", "UHV philosophy states that relationships are an inherent aspect of human existence, meaning they already exist naturally. Therefore, the task is not to 'create' them, but to become aware of and understand the existing relatedness.", "Fulfilling a relationship is the outcome of recognizing and understanding it, not the initial step. Once the relationship is recognized and its underlying feelings are understood, one can then act to fulfill it, leading to mutual happiness.", "Neglecting a relationship is contrary to the process of understanding and living in harmony with others. It leads to a lack of fulfillment and potential unhappiness, moving away from the goal of mutual happiness in relationships."]},
  {freq:1, q:"Which is NOT a feeling in relationship?", opts:["Jealousy", "Care", "Respect", "Affection"], a:0, explanations:["Jealousy is not a naturally acceptable feeling in a relationship according to UHV. It is explicitly mentioned as a manifestation of the *lack* of affection, indicating a state of disharmony or opposition rather than a value that fosters mutual fulfillment.", "Care is one of the nine naturally acceptable feelings in a relationship. It is defined as the feeling of responsibility and commitment for the nurturing and protection of the Body of one's relative, ensuring their physical well-being.", "Respect is a core value and one of the nine feelings in a relationship. It is defined as the right evaluation of the other person, recognizing their similarity in purpose, program, and potential, and their complementarity in competence.", "Affection is one of the nine naturally acceptable feelings in a relationship. It is described as the feeling of being related to the other and accepting them as one's relative, forming a bond of connectedness."]},
  {freq:1, q:"Relationship exists between", opts:["Oneself and another self", "One body and another body", "Self and body", "Body and environment"], a:0, explanations:["In Universal Human Values, relationships are fundamentally understood to exist between the 'Self' (I) of one human being and the 'Self' (I) of another human being. It is the Self that experiences feelings and recognizes the relationship, not the physical body.", "Relationships are not primarily between bodies, although bodies interact. The essence of a human relationship, involving feelings, values, and understanding, resides in the conscious Self, making it an interaction of 'I' to 'I'.", "The Self and the Body are two distinct entities that co-exist within a single human being. Their harmonious co-existence is crucial for individual well-being, but a 'relationship' in the interpersonal sense refers to the connection between two separate Selves.", "The interaction between the Body and the environment primarily concerns the need for physical facilities and ensuring mutual prosperity with nature. While important, this describes the interaction with the rest of existence, not the core of human-human relationships."]},
  {freq:1, q:"Society means", opts:["Family", "All human beings", "Few individuals", "None of these"], a:1, explanations:["Family is a fundamental unit within society, but society itself is a larger construct that encompasses many families and individuals interacting in a structured manner.", "In the context of Universal Human Values, society represents the collective level of human living that involves all human beings. UHV emphasizes working towards harmony at this societal level, which inherently implies the well-being and interconnectedness of all people.", "Society is not limited to just a few individuals; it is a complex web of relationships and interactions involving a large number of people, forming a community or a nation.", "Since 'All human beings' accurately describes the encompassing scope of human collective life that UHV aims to bring harmony to, this option is incorrect."]},
  {freq:1, q:"Nature is a collection of which of the following?", opts:["Units", "Species", "Atoms", "Molecules"], a:0, explanations:["According to UHV principles, nature is fundamentally understood as the collection of all units. These units include everything from physical entities like air, water, and soil to living beings like plants, animals, and humans.", "While species represent a classification within the bio and animal orders, the term 'species' does not encompass the entire collection of nature, which also includes non-living physical units.", "Atoms are basic constituents of matter. However, UHV describes nature as a collection of 'units' that are observable entities and systems, rather than solely their atomic components.", "Similar to atoms, molecules are sub-units of matter. The UHV framework classifies nature into broader 'orders' made up of various 'units,' which is a more comprehensive description than merely molecules."]},
  {freq:1, q:"Physical order includes units like", opts:["Plants", "Animals", "Soil", "Humans"], a:2, explanations:["Plants are classified under the 'Bio order' (or Plant order) of nature, which is distinct from the Physical order. The Bio order pertains to living flora that exhibit growth.", "Animals and birds belong to the 'Animal order' in nature. This order is characterized by a 'will to live' and activities like tasting and selecting, differentiating them from the Physical order.", "The Physical order specifically includes non-living material units such as soil, metal, air, and water. These entities are characterized by their existence and constitution.", "Humans constitute the 'Human order,' which is one of the four distinct orders in nature. Human beings are characterized by their consciousness and the 'will to live with continuous happiness'."]},
  {freq:1, q:"Which order in nature includes grass, plants, trees?", opts:["Physical", "Bio", "Animal", "Human"], a:1, explanations:["The Physical order consists of non-living material units like air, water, metal, and soil. It does not include living organisms such as grass, plants, or trees.", "The Bio order, also referred to as the Plant order, specifically encompasses all forms of vegetation, including grass, plants, and trees. Units within this order are characterized by existence and growth.", "The Animal order is distinct from the Bio order and includes animals and birds. These units possess a 'will to live' and engage in activities like taste and selection.", "The Human order is comprised solely of human beings, who are characterized by the 'will to live with continuous happiness' and the capacity for right understanding and relationships."]},
