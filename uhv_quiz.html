  {freq:1, q:"Animals/birds help spread seeds of plants from", opts:["One place to another", "One tree to another", "One forest to another", "One species to another"], a:0, explanations:["This option is correct. The UHV texts explicitly state that \"animals and birds help to spread the seeds of plants from one place to the other.\" This describes their crucial role in seed dispersal across geographical areas, facilitating plant propagation and ecological balance.", "This option is incorrect because spreading seeds only 'one tree to another' is too limited a scope for the ecological role of animals and birds. Their function extends beyond individual trees to broader environmental distribution.", "This option is incorrect as it restricts the activity of seed spreading to only 'one forest to another'. While they do this, their role encompasses spreading seeds across various 'places', which can include areas beyond just forests.", "This option is incorrect because animals and birds spread seeds of plants (units of the bio order), not seeds of 'one species to another' in the context of their own kind or other animal species. Their function is specifically in propagating plant life."]},
  {freq:1, q:"Soil-to-plants-to-soil conversion is an example of", opts:["Linear process", "Cyclic process", "Random process", "Unidirectional process"], a:1, explanations:["This option is incorrect. A linear process moves in one direction without returning to its origin, whereas the natural cycle of soil-to-plants-to-soil involves decomposition and nutrient return, indicating a continuous loop.", "This option is correct. UHV principles emphasize that production processes should be \"cyclic and mutually enriching.\" The soil-to-plants-to-soil conversion perfectly illustrates a natural cycle where nutrients from the soil are absorbed by plants, which eventually return their organic matter to the soil upon decay, making it a sustainable and regenerative process.", "This option is incorrect. Natural processes, including nutrient cycles, operate with inherent order and predictability, not randomly. The sequence of soil, plants, and their eventual return to soil follows established ecological patterns.", "This option is incorrect. A unidirectional process implies a single, irreversible flow. However, the conversion of soil-to-plants-to-soil is a continuous, circular flow where the output (decomposed plants) becomes the input for the next cycle (enriched soil)."]},
  {freq:1, q:"Which is a unit of animal order?", opts:["Soil", "Trees", "Birds", "Water"], a:2, explanations:["Soil is a unit of the Physical order, which includes elements like air, water, metal, and soil. It is not part of the animal order.", "Trees are units of the Bio order, which includes grass, plants, and trees. They are distinct from the animal order.", "This option is correct. According to the UHV classification of units into four orders, the 'Animal order' specifically includes animals and birds. Thus, birds are units of the animal order.", "Water is a unit of the Physical order, alongside soil, air, and metal. It is essential for life but does not belong to the animal order itself."]},
  {freq:1, q:"What enriches soil by acting as very good manure?", opts:["Dead leaves", "Water", "Air", "Animal dung"], a:3, explanations:["While dead leaves contribute organic matter and nutrients to the soil, the provided UHV text specifically highlights 'animal dung and their dead bodies' as acting as 'very good manure' to make the soil fertile.", "Water is crucial for plant growth and is a component of the physical order, but it does not act as manure to enrich the soil in terms of providing organic nutrients. Its role is hydration and solvent.", "Air provides essential gases like nitrogen (which can be fixed by certain bacteria) to the ecosystem, but air itself does not directly act as manure to enrich the soil in the way organic waste does.", "This option is correct. The UHV text explicitly states that 'animals enrich the soil – their dung and their dead bodies act as very good manure which makes the soil fertile.' This highlights the mutual fulfillment between the animal and physical orders."]},
  {freq:1, q:"Activity of respiration is specific to which order?", opts:["Physical", "Bio", "Animal", "Human"], a:1, explanations:["The Physical order, consisting of units like soil, metal, air, and water, is characterized by 'Existence' and undergoes processes of composition and decomposition, not respiration. Respiration is a biological activity, not a characteristic of inert physical matter.", "The Bio order, encompassing plants and trees, is characterized by 'Existence + Growth.' Respiration is a fundamental biological process vital for the growth and sustenance of life in plants, making it specific to this order as a primary life activity.", "While animals (Animal order) do respire, the Bio order represents the foundational biological processes and the beginning of life with the characteristic of 'Growth.' Plants are also crucial for the oxygen cycle, which is essential for respiration across different life forms. Therefore, 'Bio' is considered more specific as the origin of fundamental life processes including respiration.", "Human beings (Human order) certainly respire, as they are a part of the biological world. However, the question asks for the order to which respiration is 'specific.' The Bio order, with its defining characteristic of 'Existence + Growth,' represents the fundamental biological life processes that include respiration."]},
  {freq:1, q:"Units of bio order participate in", opts:["Water cycle", "Oxygen cycle", "Nitrogen cycle", "All of these"], a:3, explanations:["Units of the Bio order, primarily plants, actively participate in the water cycle. They absorb water from the soil and release it into the atmosphere through transpiration, influencing water movement and distribution.", "Plants are fundamental to the oxygen cycle through photosynthesis, where they release oxygen into the atmosphere, and also through respiration, where they consume oxygen and release carbon dioxide, maintaining atmospheric balance.", "The Bio order contributes significantly to the nitrogen cycle. Plants absorb nitrogen compounds from the soil, and some, like legumes, host nitrogen-fixing bacteria, which convert atmospheric nitrogen into usable forms.", "Based on the principle of mutual fulfillment and interconnectedness in nature, units of the Bio order (plants) are integral to all major biogeochemical cycles, including the water, oxygen, and nitrogen cycles. Their activities support the balance and continuity of nature."]},
  {freq:1, q:"Which is a Universal human value?", opts:["Trust", "Wealth", "Power", "Fame"], a:0, explanations:["Trust is explicitly identified as the 'foundational value' in human relationships and is listed among the nine universal feelings or values. It is fundamental for ensuring continuous happiness and mutual fulfillment in interactions.", "Wealth refers to physical facilities or material possessions, which are meant for the body's needs. While important for survival, wealth itself is not a universal human value, and its accumulation without right understanding can lead to problems.", "Power signifies control or dominance over others and resources. It is not recognized as a universal human value; rather, it can be a source of conflict and exploitation if not based on ethical human conduct and mutual respect.", "Fame is related to social recognition or popularity. Similar to wealth and power, fame is an external aspiration and does not inherently lead to continuous happiness or align with the intrinsic human values that ensure harmony in relationships."]},
  {freq:1, q:"Basic characteristic of ethical human conduct:", opts:["Variability", "Certainty", "Inconsistency", "Ambiguity"], a:1, explanations:["Variability contradicts the nature of ethical human conduct. Ethical conduct, based on universal human values, is definite and consistent across time, place, and individuals, rather than being variable.", "Ethical human conduct is characterized by 'definitiveness' and certainty. It implies a clear, universal set of values, policies, and character that lead to harmony within oneself and with others, and does not change based on external factors.", "Inconsistency is contrary to ethical human conduct. True ethical conduct is steady and predictable, arising from right understanding, and consistently promotes mutual fulfillment and harmony, rather than being erratic or contradictory.", "Ambiguity suggests a lack of clarity or multiple interpretations, which is not a characteristic of ethical human conduct. Ethical conduct is based on universal and definite principles, providing clear guidance for behavior and interactions."]},
  {freq:1, q:"What ensures harmony at all levels of human participation?", opts:["Universal Human Values", "Wealth", "Power", "Fame"], a:0, explanations:["Universal Human Values ensure harmony because the program for continuous happiness and living in harmony at all four levels of being (individual, family, society, and nature/existence) is to understand and live by these values. They cover all aspects of human life, promoting harmony within oneself, with other human beings, and with nature (Reference 4, Page 15).", "Wealth, or physical facility, is necessary but not sufficient for ensuring harmony. While prosperity (the feeling of having more than required physical facility) is a basic human aspiration, an obsession with accumulation without right understanding can lead to exploitation and a feeling of deprivation, thereby disturbing harmony (Reference 4, Page 15).", "Power, particularly when it refers to social status or dominance over people and resources, is not inherently a harmonizing factor in UHV. The pursuit of power often leads to differentiation and exploitation, which are antithetical to mutual fulfillment and harmonious coexistence (Reference 4, Page 4 in Q3 context mentions 'Power' as a motivational goal but not as a means to harmony in UHV).", "Fame is not identified as a factor that ensures harmony at all levels of human participation within the UHV framework. UHV focuses on internal states of happiness, right understanding, and ethical conduct for achieving harmony, rather than external achievements or recognition like fame."]},
  {freq:1, q:"Which is NOT a human value?", opts:["Trust", "Respect", "Greed", "Love"], a:2, explanations:["Trust is a fundamental human value and is considered the foundational value in human relationships. It is one of the nine definite feelings in relationships, signifying the assurance that the other person intends to make one happy (Reference 2, Page 4).", "Respect is a key human value, defined as the right evaluation of another person. It involves recognizing their similarity in purpose, program, and potential, and is crucial for harmonious human-human interaction (Reference 2, Page 4).", "Greed is not a human value; instead, it represents an excessive desire for accumulation, often of physical facilities, beyond what is genuinely required. This can lead to exploitation and dissatisfaction, disrupting harmony rather than fostering it (Reference 4, Page 15 from Q1 context, describes obsession with accumulation).", "Love is the complete value among the nine feelings in human relationships, signifying the feeling of being related to all human beings and expressed as compassion. It encompasses all other values and fosters universal harmony (Reference 2, Page 4; Reference 1, Page 14)."]},
  {freq:1, q:"What leads to harmonious coexistence?", opts:["Right understanding", "Power", "Wealth", "Fame"], a:0, explanations:["Right understanding is the primary factor that leads to harmonious coexistence at all levels of being – individual, family, society, and nature/existence. It is the basis for ethical human conduct and for developing a prosperous, undivided society (Reference 3, Page 18; Reference 5, Page 1).", "Power, defined as control or dominance over people and resources, is generally seen as a source of differentiation and potential exploitation in UHV. Its pursuit does not inherently lead to harmonious coexistence; rather, it often contributes to conflict and imbalance (Reference 2, Page 9, discusses differentiation).", "Wealth, or physical facility, while necessary for sustenance, is not sufficient for harmonious coexistence. An undue focus on accumulating wealth without right understanding can lead to exploitation and a feeling of deprivation, thereby causing disharmony (Reference 2, Page 9, discusses differentiation based on physical facility).", "Fame, like wealth and power, is an external achievement that does not directly lead to harmonious coexistence. UHV emphasizes internal harmony and right understanding as the foundation for meaningful and sustainable relationships and societal order."]},
  {freq:1, q:"Typical case study for holistic production systems:", opts:["Modern Technologies", "Ancient Technologies", "Sustainable farming", "Industrial farming"], a:2, explanations:["Modern Technologies are not inherently holistic; rather, the UHV framework advocates for the development of 'holistic technologies' that are people-friendly and eco-friendly. Not all modern technologies meet these specific criteria (Reference 1, Page 1).", "Ancient Technologies are not specifically listed as typical case studies for holistic production systems in the provided context. While some ancient practices may align with holistic principles, the UHV discussion focuses on systems that meet specific criteria like renewability and natural balance (Reference 2, Page 9).", "Sustainable farming (referred to as 'Eco-friendly agriculture' in the text) is explicitly mentioned as a typical case study for holistic production systems. These systems adhere to criteria such as preserving natural balance, utilizing local resources, and catering to real needs (Reference 2, Page 9).", "Industrial farming practices are generally not considered holistic in the UHV context due to their potential negative impacts on natural balance and resource depletion. Holistic systems prioritize eco-friendliness and sustainability, which often contrasts with conventional industrial approaches (Reference 2, Page 9, emphasizes 'Eco-friendly agriculture')."]},
  {freq:1, q:"Which value is essential in human-to-human relationship?", opts:["Trust", "Wealth", "Power", "Fame"], a:0, explanations:["Trust is the foundational value in relationships, representing the assurance that the other person wants my well-being.", "Wealth is a physical facility; while it is needed for bodily sustenance, it cannot buy emotional fulfillment or true connection in relationships.", "Power creates hierarchy, fear, and division, which are the opposite of the mutual respect and harmony required in relationships.", "Fame is temporary external approval and does not establish the inner assurance of mutual happiness that trust provides."]},
  {freq:1, q:"Process of ensuring value-based living is achieved through", opts:["Fear", "Greed", "Right understanding", "Enforcement"], a:2, explanations:["Fear (Bhaya) can force conformity temporarily but leads to resentment and does not foster genuine values.", "Greed (Lobha) drives selfish desires and accumulation, causing exploitation rather than value-based harmonious living.", "Right understanding (Samyag Darshana) allows us to see relationships and harmony clearly, naturally leading to value-based living.", "External enforcement or laws only regulate behavior superficially without changing human consciousness or values."]},

const FREQ_LABEL = f => f>=4 ? `High Priority (${f}/6 Papers)` : f===3 ? `Medium Priority (${f}/6 Papers)` : f===2 ? `Repeated (${f} Papers)` : `Asked Once`;

// Sort questions by priority (frequency)
QUESTIONS.sort((a,b)=>b.freq-a.freq);

const quizEl = document.getElementById('quiz');
const scoreEl = document.getElementById('score');
const answeredEl = document.getElementById('answered');
const filterEl = document.getElementById('filter');
const resetBtn = document.getElementById('resetBtn');
const progressBarEl = document.getElementById('progressBar');
const progressTextEl = document.getElementById('progressText');

let state = QUESTIONS.map(()=>({answered:false, correct:null, picked:null}));

function render(){
  quizEl.innerHTML='';
  const mode = filterEl.value;
  let renderedCount = 0;
  
  QUESTIONS.forEach((item,i)=>{
    if(mode==='hi' && item.freq<3) return;
    if(mode==='wrong' && !(state[i].answered && state[i].correct===false)) return;

    renderedCount++;
    const div = document.createElement('div');
    div.className = 'q' + (item.freq>=3 ? ' high':'');
    
    // Head with question number and priority
    const head = document.createElement('div');
    head.className='qhead';
    head.innerHTML = `<span class="qnum">Question ${i+1}</span><span class="freq ${item.freq>=3?'hi':''}">${FREQ_LABEL(item.freq)}</span>`;
    div.appendChild(head);
    
    // Question text
    const qt = document.createElement('div');
    qt.className='qtext';
    qt.textContent = item.q;
    div.appendChild(qt);
    
    // Options grid
    const opts = document.createElement('div');
    opts.className='opts';
    item.opts.forEach((opt,oi)=>{
      const b = document.createElement('button');
      b.className='opt';
      b.textContent = opt;
      
      if(state[i].answered){
        b.disabled = true;
        if(oi===item.a) b.classList.add('correct');
        if(state[i].picked===oi && oi!==item.a) b.classList.add('wrong');
      }
      
      b.onclick = ()=>{
        if(state[i].answered) return;
        state[i].answered = true;
        state[i].picked = oi;
        state[i].correct = (oi===item.a);
        updateScore();
        render(); // Rerender to show states and explanations
      };
      opts.appendChild(b);
    });
    div.appendChild(opts);
    
    // Explanations Box (shows only if answered)
    if(state[i].answered){
      const expCard = document.createElement('div');
      expCard.className = 'explanation-card';
      
      const header = document.createElement('div');
      header.className = 'explanation-header ' + (state[i].correct ? 'correct' : 'wrong');
      header.innerHTML = state[i].correct 
        ? `<span>✓ Correct Response</span>` 
        : `<span>✗ Incorrect Response (Correct is: Option ${String.fromCharCode(65 + item.a)})</span>`;
      expCard.appendChild(header);
      
      const body = document.createElement('div');
      body.className = 'explanation-body';
      
      // Check if we have pre-computed explanations
      if(item.explanations && item.explanations.length === item.opts.length){
        // 1. Explanation of the picked option
        const pickedSec = document.createElement('div');
        pickedSec.className = 'explanation-section';
        const isPickedCorrect = (state[i].picked === item.a);
        pickedSec.innerHTML = `
          <div class="explanation-title ${isPickedCorrect ? 'good' : 'bad'}">
            Your Choice: ${item.opts[state[i].picked]} (${isPickedCorrect ? 'Correct' : 'Incorrect'})
          </div>
          <div class="explanation-text">${item.explanations[state[i].picked]}</div>
        `;
        body.appendChild(pickedSec);
        
        // 2. If wrong, show the correct explanation as well
        if(!isPickedCorrect){
          const correctSec = document.createElement('div');
          correctSec.className = 'explanation-section';
          correctSec.innerHTML = `
            <div class="explanation-title good">
              Correct Choice: ${item.opts[item.a]}
            </div>
            <div class="explanation-text">${item.explanations[item.a]}</div>
          `;
          body.appendChild(correctSec);
        }
      } else {
        // Fallback explanation if JSON is not generated yet
        body.innerHTML = `
          <div class="explanation-section">
            <div class="explanation-text">
              ${state[i].correct 
                ? 'Great job! You selected the right answer.' 
                : `You selected "${item.opts[state[i].picked]}". The correct answer is "${item.opts[item.a]}". (Detailed notes explanations are being compiled...)`}
            </div>
          </div>
        `;
      }
      
      expCard.appendChild(body);
      div.appendChild(expCard);
    }
    
    quizEl.appendChild(div);
  });
  
  if(renderedCount===0){
    quizEl.innerHTML = '<p style="font-family:inherit;color:var(--text-muted);text-align:center;padding:40px;">No questions match this filter.</p>';
  }
}

function updateScore(){
  const answered = state.filter(s=>s.answered).length;
  const correct = state.filter(s=>s.correct===true).length;
  
  scoreEl.textContent = correct;
  answeredEl.textContent = answered;
  
  // Update progress bar
  const total = QUESTIONS.length;
  const percent = total > 0 ? Math.round((answered / total) * 100) : 0;
  progressBarEl.style.width = `${percent}%`;
  progressTextEl.textContent = `${percent}% Completed (${answered}/${total})`;
}

filterEl.onchange = render;
resetBtn.onclick = ()=>{
  if(confirm("Are you sure you want to reset all your progress?")){
    state = QUESTIONS.map(()=>({answered:false, correct:null, picked:null}));
    updateScore();
    render();
  }
};

render();
updateScore();
</script>
